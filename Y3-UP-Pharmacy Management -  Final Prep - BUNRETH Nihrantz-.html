            { id: 161, text: "What is the correct definition of Right Place?", options: ["Supplying medicines to the appropriate location (e.g., malaria meds to malaria areas).", "Supplier does not supply to the right place.", "Supplier supplies to any location randomly.", "Supplier supplies to areas that did not request them."], correct: 0, explanation: "Option a: Correct — Right Place = Matches Geographic/Disease Need." },
            { id: 162, text: "What is the correct definition of Right Cost?", options: ["Buyers/suppliers choose the most expensive price.", "Buyers/suppliers choose the appropriate/affordable price.", "Buyers/suppliers choose the lowest price only.", "Buyers/suppliers choose the most expensive price."], correct: 1, explanation: "Option b: Correct — Right Cost = Affordable + Sustainable (Value for Money)." },
            { id: 163, text: "When theft occurs at a pharmacy, what should you absolutely NOT do before police finish?", options: ["Affect remaining samples from the theft.", "Clean up any evidence left from the theft.", "Clean up evidence", "It is strictly forbidden to touch any evidence left from the theft."], correct: 3, explanation: "Option d: Correct — Preserve Evidence = Do Not Touch until police investigate." },
            { id: 164, text: "What condition indicates Good Stock (Available/Suitable)?", options: ["Minimum Stock < MoS < Maximum Stock", "MoS < Minimum Stock", "MoS > Maximum Stock", "MoS = 0"], correct: 0, explanation: "Option a: Correct — Safe Zone = Between Min and Max limits." },
            { id: 165, text: "What condition indicates Congestion (Overstock)?", options: ["Minimum Stock < MoS < Maximum Stock", "MoS < Minimum Stock", "MoS > Maximum Stock", "MoS = 0"], correct: 2, explanation: "Option c: Correct — Overstock = Exceeds Maximum limit." },
            { id: 166, text: "What condition indicates Out of Stock?", options: ["Minimum Stock < MoS < Maximum Stock", "MoS < Minimum Stock", "MoS > Maximum Stock", "MoS = 0"], correct: 3, explanation: "Option d: Correct — Stock Out = Zero Months of Stock." },
            { id: 167, text: "What is the name of the activity: Counting actual medicines vs. ledger balance?", options: ["Finding medicine for congestion.", "Inventory.", "Finding substandard medicines.", "Finding lost medicine."], correct: 1, explanation: "Option b: Correct — Inventory = Physical Count vs. Records." },
            { id: 168, text: "If medicine loss is suspected, what should you do first?", options: ["Find medicine for congestion.", "Find lost medicine.", "Find substandard medicines.", "Do an internal inventory first."], correct: 3, explanation: "Option d: Correct — Verify via Inventory before accusing/reporting." },
            { id: 169, text: "After confirmed loss via inventory, what should you do?", options: ["Investigate, record results, report to head, follow legal procedures.", "Search for out-of-stock medicines.", "Find substandard medicines.", "Transfer the medicine out."], correct: 0, explanation: "Option a: Correct — Formal Process: Investigate → Document → Report → Legal Action." },
            { id: 170, text: "Is receiving medicine without a mission letter/certificate allowed?", options: ["Occurs due to illegal collusion.", "Absolutely impossible unless there is a letter of mission/nomination.", "Occurs due to illegal fraternization.", "Occurs due to illegal friendship."], correct: 1, explanation: "Option b: Correct — Official Business Requires Official Documents." },
            { id: 171, text: "Which forecasting method is the most important?", options: ["Morbidity method.", "Adjusted consumption method.", "Service level exploration method.", "No single method is best; depends on actual needs/data."], correct: 3, explanation: "Option d: Correct — Context Matters = Choose method based on Data Availability & Needs." },
            { id: 172, text: "What data is needed for the Consumption Method of forecasting?", options: ["Dispensed Data & Issued Data.", "Adjusted data.", "Service level exploration data.", "Primary data."], correct: 0, explanation: "Option a: Correct — Consumption Method uses past Usage Records (Dispensed/Issued)." },
            { id: 173, text: "Does the Kingdom of Cambodia have a Pharmacists' Association?", options: ["Not yet available.", "Existed and in operation.", "Not yet, working group is being formed.", "Not available yet, still researching."], correct: 1, explanation: "Option b: Correct — Pharmaceutical Association of Cambodia is active." },
            { id: 174, text: "When verifying a prescription, what key points confirm appropriateness?", options: ["Filling prescriptions according to doctor's routine.", "Filling prescriptions as requested by the patient.", "All prescriptions filled appropriately + correct treatment level.", "Filling prescriptions as requested by management."], correct: 2, explanation: "Option c: Correct — Check Appropriateness + Treatment Level per guidelines." },
            { id: 175, text: "If a prescription matches health problems + treatment guidelines, how do you conclude?", options: ["The doctor prescribes appropriate treatment.", "The doctor prescribed inappropriate treatment.", "The doctor prescribes routine treatment.", "The doctor prescribes treatment at management request."], correct: 0, explanation: "Option a: Correct — Match with guidelines = Appropriate Treatment." },
            { id: 176, text: "If a prescription matches weight + restrictions + treatment guide, how do you conclude?", options: ["There is an incorrect medical prescription.", "There are strict treatment guidelines followed.", "There are restrictions on the patient's request.", "The doctor prescribed treatment not in accordance with guidelines."], correct: 1, explanation: "Option b: Correct — Matching weight/restrictions = Guidelines Followed." },
            { id: 177, text: "How many key items must be properly supplied when delivering health services directly to patients?", options: ["There are 5 items.", "There are 3 items.", "There are 4 items.", "There are 6 items."], correct: 3, explanation: "Option d: Correct — closest to the standard framework (ideally 7 Rights), covering essential supply elements." },
            { id: 178, text: "What are the correct principles for supplying health products to patients?", options: ["4 principles: Right quantity, Right time, Right place, Right cost.", "3 types: Pull system, Push system, Right patient.", "6 principles: Right product, Right quantity, Right condition, Right time, Right place, Right cost.", "5 principles: Right quantity, Right time, Right place, Right cost, Right patient."], correct: 2, explanation: "Option c: Correct — 6 core Rights covering product integrity, timing, location, and cost." },
            { id: 179, text: "If Pipeline ≥ MoS, how do we conclude the stock situation?", options: ["Our stock will not expire.", "Our stock will be free of congestion.", "Our stock will be transferred out until the next supply date.", "We will experience a stockout (run out) before the new supply arrives."], correct: 3, explanation: "Option d: Correct — If lead time (Pipeline) is longer than current stock (MoS), you run out before replenishment." },
            { id: 180, text: "If Pipeline ≥ MoS (risk of stockout), how should you handle the situation?", options: ["Hold a meeting to report the shortage only.", "Ask doctors for therapeutic substitution, request extra funds/orders, and ask suppliers for early delivery.", "Request the destruction of substandard medicines.", "Request the supplier to extend the supply contract timeline."], correct: 1, explanation: "Option b: Correct — 3-Step Fix: Substitute (clinical), Order More (procurement), Expedite (supplier)." }
        ];

        /* STATE MANAGEMENT */
        let currentState = {
            currentIndex: 0,
            answers: new Array(questions.length).fill(null),
            status: new Array(questions.length).fill('unanswered')
        };

        /* DOM ELEMENTS */
        const container = document.getElementById('quiz-content');
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const progressText = document.getElementById('progress-text');
        const gridModal = document.getElementById('grid-modal');
        const gridContainer = document.getElementById('grid-container');

        /* INITIALIZATION */
        function init() {
            renderQuestion(0);
            renderGrid();
            updateButtons();
        }

        /* RENDER LOGIC */
        function renderQuestion(index) {
            const q = questions[index];
            
            let html = `
                <div class="question-block">
                    <div class="question-text">
                        <span style="color:var(--clinical-blue); margin-right:8px;">Q${q.id}.</span>
                        ${q.text}
                    </div>
                    <ul class="options-list">
            `;

            q.options.forEach((opt, idx) => {
                const isSelected = currentState.answers[index] === idx;
                const isCorrect = q.correct === idx;
                let feedbackHtml = '';
                
                if (currentState.answers[index] !== null) {
                    if (isSelected && isCorrect) {
                        feedbackHtml = `<span class="feedback correct">CORRECT</span>`;
                    } else if (isSelected && !isCorrect) {
                        feedbackHtml = `<span class="feedback incorrect">INCORRECT</span>`;
                    } else if (!isSelected && isCorrect) {
                         feedbackHtml = `<span class="feedback correct">CORRECT</span>`;
                    }
                }

                html += `
                    <li class="option-item ${isSelected ? 'selected' : ''}" onclick="handleAnswer(${index}, ${idx})">
                        <span>${String.fromCharCode(97 + idx)}) ${opt}</span>
                        ${feedbackHtml}
                    </li>
                `;
            });

            const explanationClass = currentState.answers[index] !== null ? 'show' : '';
            html += `
                    </ul>
                    <div class="explanation ${explanationClass}">
                        <strong>Explanation:</strong> ${q.explanation}
                    </div>
                </div>
            `;

            container.innerHTML = html;
            progressText.textContent = `${index + 1} / ${questions.length}`;
            document.querySelector('main').scrollTop = 0;
            updateGridHighlight();
        }

        /* INTERACTION HANDLERS */
        function handleAnswer(qIndex, optIndex) {
            if (currentState.answers[qIndex] === null) {
                currentState.status[qIndex] = 'answered';
            }
            currentState.answers[qIndex] = optIndex;
            renderQuestion(qIndex);
            renderGrid();
        }

        function nextQuestion() {
            if (currentState.currentIndex < questions.length - 1) {
                currentState.currentIndex++;
                renderQuestion(currentState.currentIndex);
                updateButtons();
            }
        }

        function prevQuestion() {
            if (currentState.currentIndex > 0) {
                currentState.currentIndex--;
                renderQuestion(currentState.currentIndex);
                updateButtons();
            }
        }

        function jumpToQuestion(index) {
            currentState.currentIndex = index;
            renderQuestion(index);
            updateButtons();
            toggleGrid();
        }

        /* NAVIGATION UPDATES */
        function updateButtons() {
            prevBtn.disabled = currentState.currentIndex === 0;
            if (currentState.currentIndex === questions.length - 1) {
                nextBtn.textContent = "Finish";
                nextBtn.onclick = finishQuiz;
            } else {
                nextBtn.textContent = "Next";
                nextBtn.onclick = nextQuestion;
            }
        }

        /* GRID / MODAL LOGIC */
        function toggleGrid() {
            if (gridModal.style.display === 'flex') {
                gridModal.style.display = 'none';
            } else {
                renderGrid();
                gridModal.style.display = 'flex';
            }
        }

        function renderGrid() {
            let html = '';
            currentState.status.forEach((status, idx) => {
                let classes = 'grid-item';
                if (idx === currentState.currentIndex) classes += ' current';
                if (status === 'answered') classes += ' answered';
                else classes += ' unanswered';

                html += `<div class="${classes}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
            });
            gridContainer.innerHTML = html;
        }

        function updateGridHighlight() {
            renderGrid(); 
        }

        /* FINISH LOGIC */
        function finishQuiz() {
            let score = 0;
            currentState.answers.forEach((ans, idx) => {
                if (ans === questions[idx].correct) {
                    score++;
                }
            });

            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.querySelector('.score-display').textContent = `Score: ${score} / ${questions.length}`;
        }

        init();

    </script>
</body>
</html>
