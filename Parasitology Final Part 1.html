<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Parasitology Assessment</title>
    <style>
        /* --- RESET & BASIC SETUP --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CLINICAL CONTAINER --- */
        .clinical-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            /* Medical chart paper texture effect */
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 31px,
                #eef1f5 31px,
                #eef1f5 32px
            );
            border: 2px solid #0056b3; /* Medical Blue */
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            background-color: #0056b3;
            color: white;
            padding: 15px 20px;
            border-bottom: 4px solid #003d80;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
        }

        /* --- BUTTONS --- */
        button {
            font-family: Arial, sans-serif;
            cursor: pointer;
            border: 1px solid #0056b3;
            outline: none;
            transition: all 0.2s ease;
        }

        .btn-nav {
            background-color: white;
            color: #0056b3;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 2px;
        }

        .btn-nav:hover {
            background-color: #e6f0fa;
        }

        .btn-nav:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
            background-color: #f9f9f9;
        }

        .btn-primary {
            background-color: #0056b3;
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 2px;
        }

        .btn-primary:hover {
            background-color: #004494;
        }

        /* --- PROGRESS BAR --- */
        .progress-bar-container {
            background-color: #e0e0e0;
            height: 6px;
            width: 100%;
        }

        .progress-bar-fill {
            background-color: #0056b3;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* --- MAIN CONTENT AREA --- */
        main {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            min-height: 400px;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 25px;
            line-height: 1.4;
            padding-left: 5px;
            border-left: 4px solid #0056b3;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            text-align: left;
            font-size: 1rem;
            color: #333;
            border-radius: 2px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e6f0fa; /* Light blue hover */
            border-color: #0056b3;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.8;
        }

        /* Feedback Styling */
        .feedback {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .correct {
            color: #008000; /* Green */
            border-color: #008000 !important;
            background-color: #f0fff0 !important;
        }

        .incorrect {
            color: #cc0000; /* Red */
            border-color: #cc0000 !important;
            background-color: #fff0f0 !important;
        }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px dashed #0056b3;
            border-radius: 2px;
            font-size: 0.95rem;
            color: #444;
            display: none; /* Hidden by default */
            line-height: 1.5;
        }

        .explanation-box strong {
            color: #0056b3;
        }

        /* --- RESULT SCREEN --- */
        #result-screen {
            display: none;
            text-align: center;
            padding-top: 40px;
        }

        .result-title {
            font-size: 2rem;
            color: #0056b3;
            margin-bottom: 20px;
            border-bottom: 2px solid #0056b3;
            display: inline-block;
            padding-bottom: 10px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .score-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* --- FOOTER BRANDING --- */
        footer {
            border-top: 2px solid #0056b3;
            padding: 15px 20px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .credit-text {
            font-style: italic;
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        .social-bar {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 0; /* Square buttons requested */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .social-btn:hover {
            background-color: #003d80;
        }

        /* --- PATIENT LIST MODAL (GRID) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border: 2px solid #0056b3;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .modal-header {
            background-color: #0056b3;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
        }

        .grid-item {
            width: 45px;
            height: 45px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            background-color: white;
            border-radius: 2px;
            font-size: 0.9rem;
        }

        /* Grid Status Indicators */
        .grid-item.current {
            border: 2px solid #0056b3; /* Blue border */
            background-color: white;
        }

        .grid-item.answered {
            background-color: #cce5ff; /* Light blue background */
            border-color: #99ccff;
            color: #003d80;
        }

        .grid-item:hover {
            border-color: #0056b3;
        }

        /* --- UTILITY CLASSES --- */
        .hidden {
            display: none !important;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .option-btn { padding: 12px; font-size: 0.95rem; }
            .score-display { font-size: 3rem; }
        }
    </style>
</head>

    <script>
        // --- DATASET: 157 QUESTIONS ---
        const quizData = [
            { q: "Hydrocele is most frequently associated with which species?", options: ["Brugia malayi", "Wuchereria bancrofti", "Loa loa", "Onchocerca volvulus"], a: 1, exp: "Hydrocele is a common manifestation of chronic lymphatic filariasis caused by Wuchereria bancrofti." },
            { q: "Which parasite is associated with 'fugitive swellings'?", options: ["Wuchereria bancrofti", "Brugia malayi", "Loa loa", "Onchocerca volvulus"], a: 2, exp: "Fugitive swellings (Calabar swellings) are transient, localized edematous swellings that migrate across subcutaneous tissues, hallmark of loiasis." },
            { q: "What is the infective stage of filarial worms for humans?", options: ["Microfilaria", "L1 larva", "L3 larva", "Cercaria"], a: 2, exp: "Filarial nematodes require an arthropod vector. Within the vector, microfilariae develop into infective third-stage larvae (L3)." },
            { q: "The presence of a 'sheath' is a diagnostic feature of the microfilariae of:", options: ["Onchocerca volvulus", "Wuchereria bancrofti", "Mansonella ozzardi", "Mansonella perstans"], a: 1, exp: "Microfilariae of W. bancrofti are sheathed, meaning they are surrounded by a thin, transparent membrane derived from the eggshell." },
            { q: "Which stain is commonly used to study the morphology of microfilariae?", options: ["Gram stain", "Giemsa stain", "Acid-fast stain", "Iodine stain"], a: 1, exp: "Giemsa stain is a Romanowsky-type stain that differentially colors cellular components, highlighting nuclei and sheath." },
            { q: "The term 'lymphangitis' refers to:", options: ["Inflammation of lymph nodes", "Inflammation of lymphatic vessels", "Enlargement of the spleen", "Obstruction of the bile duct"], a: 1, exp: "Lymphangitis is acute inflammation of the lymphatic vessels, often presenting as red, tender, cord-like streaks." },
            { q: "Which parasite’s microfilariae show 'diurnal periodicity'?", options: ["Wuchereria bancrofti", "Brugia malayi", "Loa loa", "Mansonella perstans"], a: 2, exp: "Loa loa microfilariae exhibit diurnal periodicity—circulating in peripheral blood during daylight hours." },
            { q: "The vector for Brugia timori is:", options: ["Culex", "Anopheles", "Mansonia", "Simulium"], a: 1, exp: "Brugia timori, found primarily in Indonesia, is transmitted by Anopheles barbirostris mosquitoes." },
            { q: "Calabar swellings are a characteristic feature of which infection?", options: ["Bancroftian filariasis", "Loiasis", "Onchocerciasis", "Malayan filariasis"], a: 1, exp: "Calabar swellings are transient, angioedema-like subcutaneous swellings caused by Loa loa migration." },
            { q: "Which parasite produces microfilariae that are typically found in the skin, not blood?", options: ["Wuchereria bancrofti", "Brugia malayi", "Onchocerca volvulus", "Loa loa"], a: 2, exp: "Onchocerca volvulus microfilariae reside in the dermis and do not circulate in peripheral blood." },
            { q: "The life span of an adult Wuchereria bancrofti worm is approximately:", options: ["1 month", "1 year", "5–10 years", "20–30 years"], a: 2, exp: "Adult filarial worms are long-lived. W. bancrofti adults can survive 5–10 years in human lymphatics." },
            { q: "The drug of choice for treating Onchocerciasis is:", options: ["Diethylcarbamazine (DEC)", "Ivermectin", "Praziquantel", "Albendazole"], a: 1, exp: "Ivermectin is the drug of choice because it paralyzes and kills microfilariae, preventing ocular damage." },
            { q: "Microfilariae are:", options: ["Egg", "Embryos (advanced first-stage larvae)", "Adult worms", "Encysted larvae"], a: 1, exp: "Microfilariae are pre-larval stages released by adult female filarial worms. They are technically advanced first-stage larvae (L1)." },
            { q: "Chronic lymphatic obstruction in filariasis leads to:", options: ["High blood pressure", "Lymphedema", "Ascites", "Pulmonary edema"], a: 1, exp: "Persistent inflammation and fibrosis from adult worms block lymphatic vessels, causing protein-rich fluid accumulation in tissues." },
            { q: "“Sclerosing keratitis” is a complication of:", options: ["Bancroftian filariasis", "Onchocerciasis", "Loiasis", "Dracunculiasis"], a: 1, exp: "Sclerosing keratitis is a leading cause of blindness in onchocerciasis ('river blindness')." },
            { q: "Where are 'onchocercomas' (subcutaneous nodules) found?", options: ["In the lungs", "Over bony prominences", "In the brain", "In the liver"], a: 1, exp: "Onchocercomas are fibrous nodules containing adult O. volvulus worms, forming near joints and over bony areas." },
            { q: "Which mosquito genus is the primary vector for Brugia malayi?", options: ["Culex", "Mansonia", "Aedes", "Culiseta"], a: 1, exp: "Mansonia mosquitoes are the main vectors for B. malayi in rural Southeast Asia." },
            { q: "The “Mazzotti reaction” is a severe allergic response seen during treatment of:", options: ["Bancroftian filariasis", "Onchocerciasis", "Loiasis", "Ascariasis"], a: 1, exp: "The Mazzotti reaction occurs when ivermectin rapidly kills O. volvulus microfilariae, triggering intense inflammation." },
            { q: "The “skin snip” method is the primary diagnostic tool for:", options: ["Wuchereria bancrofti", "Loa loa", "Onchocerca volvulus", "Brugia malayi"], a: 2, exp: "Since O. volvulus microfilariae reside in skin, diagnosis relies on skin snips examined for emerging microfilariae." },
            { q: "Filarial worms belong to the class:", options: ["Cestoda", "Trematoda", "Nematoda", "Protozoa"], a: 2, exp: "Filarial worms are roundworms, classified under phylum Nematoda." },
            { q: "Which mosquito genus is a major vector for W. bancrofti in urban areas?", options: ["Aedes", "Culex", "Mansonia", "Anopheles"], a: 1, exp: "In urban settings, Culex quinquefasciatus is the primary vector for W. bancrofti." },
            { q: "What is the intermediate host/vector for Onchocerca volvulus?", options: ["Culex mosquito", "Anopheles mosquito", "Simulium (blackfly)", "Chrysops (deer fly)"], a: 2, exp: "Onchocerca volvulus is transmitted by female Simulium blackflies." },
            { q: "What is the definitive host for Wuchereria bancrofti?", options: ["Mosquito", "Human", "Pig", "Cattle"], a: 1, exp: "The definitive host harbors the sexually mature stage. In W. bancrofti, humans are the only natural definitive host." },
            { q: "“River blindness” is caused by which parasite?", options: ["Brugia malayi", "Loa loa", "Onchocerca volvulus", "Mansonella perstans"], a: 2, exp: "Onchocerciasis, or river blindness, is caused by O. volvulus." },
            { q: "Occult filariasis (Tropical Pulmonary Eosinophilia, TPE) is characterized by:", options: ["Presence of numerous microfilariae in blood", "Absence of microfilariae in blood", "Absence of antibodies", "Normal eosinophil count"], a: 1, exp: "TPE is a hypersensitivity reaction to filarial antigens. Patients have high IgE and eosinophilia but no detectable microfilariae." },
            { q: "Which clinical sign involves the presence of milky white urine?", options: ["Hematuria", "Chyluria", "Proteinuria", "Glycosuria"], a: 1, exp: "Chyluria results from lymphatic leakage into the urinary tract due to filarial-induced lymphatic rupture." },
            { q: "What is the standard dose of DEC in the treatment of bancroftian filariasis?", options: ["2 mg/kg for 1 day", "6 mg/kg for 12 days", "10 mg/kg for 30 days", "100 mg/kg once"], a: 1, exp: "The WHO-recommended regimen is DEC at 6 mg/kg/day orally for 12 days." },
            { q: "Mansonella perstans adult worms live in:", options: ["Subcutaneous tissue", "Body cavities (pleural/peritoneal)", "Lymphatic vessels", "Conjunctiva"], a: 1, exp: "Unlike other filariae, M. perstans adults reside in serous cavities." },
            { q: "Which of these is a non-periodic filarial worm?", options: ["Wuchereria bancrofti (Indian strain)", "Brugia malayi", "Onchocerca volvulus", "Loa loa"], a: 2, exp: "O. volvulus microfilariae are in skin—not blood—so they are considered non-periodic." },
            { q: "Which diagnostic test involves the concentration of microfilariae from blood?", options: ["Kato-Katz technique", "Knott’s concentration", "Baermann technique", "Formal-ether sedimentation"], a: 1, exp: "Knott’s method uses centrifugation of lysed blood to concentrate microfilariae." },
            { q: "Which filarial worm is the most common cause of lymphatic filariasis?", options: ["Brugia malayi", "Wuchereria bancrofti", "Loa loa", "Onchocerca volvulus"], a: 1, exp: "Wuchereria bancrofti accounts for approximately 90% of all lymphatic filariasis cases worldwide." },
            { q: "Which parasite is known as the “eye worm”?", options: ["Wuchereria bancrofti", "Brugia malayi", "Loa loa", "Onchocerca volvulus"], a: 2, exp: "Loa loa is called the 'eye worm' because adult worms can migrate across the conjunctiva." },
            { q: "Which filarial worm is NOT found in the peripheral blood?", options: ["Wuchereria bancrofti", "Brugia malayi", "Onchocerca volvulus", "Loa loa"], a: 2, exp: "Onchocerca volvulus microfilariae reside exclusively in the skin and eyes." },
            { q: "At what time is “nocturnal periodicity” most evident for W. bancrofti microfilariae in blood?", options: ["10 am to 2 pm", "6 am to 10 am", "10 pm to 2 am", "2 pm to 6 pm"], a: 2, exp: "Peak microfilarial density in peripheral blood is between 10 PM and 2 AM." },
            { q: "Tropical pulmonary eosinophilia (TPE) is an occult form of which infection?", options: ["Ascariasis", "Filariasis", "Hookworm", "Strongyloidiasis"], a: 1, exp: "TPE is a hypersensitivity reaction to microfilarial antigens (usually from W. bancrofti)." },
            { q: "Which drug is the primary treatment for lymphatic filariasis?", options: ["Praziquantel", "Diethylcarbamazine (DEC)", "Metronidazole", "Chloroquine"], a: 1, exp: "DEC is microfilaricidal and partially macrofilaricidal against W. bancrofti and Brugia spp." },
            { q: "“Adenolymphangitis” (ADL) in filariasis refers to:", options: ["Chronic swelling", "Acute febrile episodes with painful lymphatics", "Internal organ failure", "Skin rashes"], a: 1, exp: "ADL episodes are acute inflammatory attacks involving fever, pain, redness, and tenderness along lymphatic channels." },
            { q: "Which filarial species is mostly restricted to South and East Asia?", options: ["Wuchereria bancrofti", "Brugia malayi", "Loa loa", "Onchocerca volvulus"], a: 1, exp: "Brugia malayi is endemic in India, China, Indonesia, Malaysia, Philippines, and Thailand." },
            { q: "Brugia malayi microfilariae can be distinguished by having:", options: ["No nuclei in the tail", "Two terminal nuclei in the tail", "A single terminal nucleus", "A blunt tail without nuclei"], a: 1, exp: "Brugia malayi microfilariae have two distinct nuclei at the tip of the tail." },
            { q: "“Leopard skin” (spotty depigmentation) is seen in:", options: ["Chronic bancroftian filariasis", "Chronic onchocerciasis", "Acute loiasis", "Malayan filariasis"], a: 1, exp: "“Leopard skin” refers to patchy depigmentation of the shins due to chronic inflammation by O. volvulus." },
            { q: "Which filarial worm is viviparous?", options: ["All filarial worms", "Only W. bancrofti", "Only Onchocerca", "None; they are all oviparous"], a: 0, exp: "All medically important filarial nematodes are viviparous—they produce live microfilariae." },
            { q: "What is the common name for the condition involving gross enlargement of the limbs in filariasis?", options: ["Löffler’s syndrome", "Elephantiasis", "Swimmer’s itch", "Katayama fever"], a: 1, exp: "Elephantiasis describes severe, disfiguring swelling and thickening of skin and underlying tissues." },
            { q: "The DEC provocation test is used for:", options: ["Kill adult worms", "Bring microfilariae into peripheral blood during the day", "Treat elephantiasis", "Diagnose malaria"], a: 1, exp: "A small dose of DEC causes microfilariae to appear in peripheral blood within 30–60 minutes if they are present." },
            { q: "Which filarial worm is primarily transmitted by Chrysops (deer flies)?", options: ["Wuchereria bancrofti", "Loa loa", "Onchocerca volvulus", "Brugia malayi"], a: 1, exp: "Loa loa is transmitted by day-biting Chrysops spp. in rainforest areas." },
            { q: "Which of the following is a classic manifestation of chronic filariasis?", options: ["Bloody diarrhea", "Hydrocele", "Iron deficiency anemia", "Clay pipe stem fibrosis"], a: 1, exp: "Hydrocele is one of the most common chronic manifestations of W. bancrofti infection." },
            { q: "Which filarial worm is known to cause “hanging groin”?", options: ["Wuchereria bancrofti", "Onchocerca volvulus", "Brugia malayi", "Loa loa"], a: 0, exp: "“Hanging groin” refers to massive inguinal lymphedema caused by chronic bancroftian filariasis." },
            { q: "Where do adult Wuchereria bancrofti worms typically reside in the human body?", options: ["Subcutaneous tissue", "Bloodstream", "Lymphatic vessels", "Small intestine"], a: 2, exp: "Adult W. bancrofti worms live coiled within lymphatic vessels and lymph nodes." },
            { q: "Which of the following is NOT a lymphatic filarial worm?", options: ["Wuchereria bancrofti", "Brugia malayi", "Brugia timori", "Loa loa"], a: 3, exp: "Loa loa is a subcutaneous filarial worm, not lymphatic." },
            { q: "Which condition is characterized by nocturnal cough, dyspnea, and high eosinophilia?", options: ["Cutaneous larva migrans", "Tropical pulmonary eosinophilia", "Visceral larva migrans", "Löffler’s syndrome"], a: 1, exp: "TPE presents with paroxysmal nocturnal cough, wheezing, dyspnea, and marked eosinophilia." },
            { q: "“Filarial dance sign” is a diagnostic finding seen on:", options: ["X-ray", "Ultrasonography", "CT scan", "MRI"], a: 1, exp: "The “filarial dance sign” is real-time ultrasonographic visualization of motile adult worms in dilated lymphatics." },
            { q: "What is the shape of the pinworm egg?", options: ["Spherical", "Barrel-shape with plugs", "Elongated ovoid, flattened on one side", "Elliptical and bile-stained"], a: 2, exp: "Enterobius vermicularis eggs are asymmetrical, elongated ovals flattened on one side." },
            { q: "What is a distinctive morphological feature of the female pinworm?", options: ["A curved posterior end", "A double-bulb esophagus", "A long, whip-like tail", "A thin, pointed, pin-like tail"], a: 3, exp: "The female Enterobius has a characteristic sharply pointed (pin-like) tail." },

        const optionsContainer = document.getElementById('options-container');
        const explanationBox = document.getElementById('explanation-box');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-fill');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const quizInterface = document.getElementById('quiz-interface');
        const quizFooter = document.getElementById('quiz-footer');
        const resultScreen = document.getElementById('result-screen');
        
        // Modal Elements
        const modal = document.getElementById('list-modal');
        const viewListBtn = document.getElementById('view-list-btn');
        const closeModalBtn = document.getElementById('close-modal');
        const gridContainer = document.getElementById('grid-container');

        // --- INITIALIZATION ---
        function initQuiz() {
            renderQuestion();
            updateProgress();
            updateNavButtons();
        }

        // --- RENDER QUESTION ---
        function renderQuestion() {
            const data = quizData[currentQuestionIndex];
            
            // Reset UI
            questionTextEl.textContent = `${currentQuestionIndex + 1}. ${data.q}`;
            optionsContainer.innerHTML = '';
            explanationBox.style.display = 'none';
            
            // Render Options
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${String.fromCharCode(97 + index)}. ${opt}</span>`;
                
                // If this question was already answered
                if (userAnswers[currentQuestionIndex] !== null) {
                    btn.disabled = true; // Disable re-answering
                    
                    const selectedIdx = userAnswers[currentQuestionIndex];
                    const correctIdx = data.a;

                    // Show Feedback Text if this is the selected button
                    if (index === selectedIdx) {
                        const feedbackSpan = document.createElement('span');
                        feedbackSpan.className = 'feedback';
                        if (selectedIdx === correctIdx) {
                            btn.classList.add('correct');
                            feedbackSpan.textContent = 'CORRECT';
                        } else {
                            btn.classList.add('incorrect');
                            feedbackSpan.textContent = 'INCORRECT';
                        }
                        btn.appendChild(feedbackSpan);
                    }

                    // Highlight correct answer if wrong was chosen (optional helpful visual)
                    if (index === correctIdx && selectedIdx !== correctIdx) {
                         btn.classList.add('correct');
                    }
                } else {
                    // Click Handler for active question
                    btn.onclick = () => handleAnswer(index);
                }

                optionsContainer.appendChild(btn);
            });

            // Show Explanation if answered
            if (userAnswers[currentQuestionIndex] !== null) {
                explanationText.textContent = data.exp;
                explanationBox.style.display = 'block';
            }

            // Update Navigation Buttons State
            updateNavButtons();
            updateGridStatus();
        }

        // --- HANDLE ANSWER ---
        function handleAnswer(selectedIndex) {
            const data = quizData[currentQuestionIndex];
            userAnswers[currentQuestionIndex] = selectedIndex;

            if (selectedIndex === data.a) {
                score++;
            }

            // Re-render to show feedback and explanation
            renderQuestion();
            updateProgress();
        }

        // --- NAVIGATION ---
        prevBtn.onclick = () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        };

        nextBtn.onclick = () => {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        };

        function updateNavButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            
            // Determine Next Button text/state
            if (currentQuestionIndex === quizData.length - 1) {
                // If it's the last question
                if (userAnswers[currentQuestionIndex] !== null) {
                    nextBtn.textContent = "Finish Test";
                    nextBtn.disabled = false;
                } else {
                    nextBtn.textContent = "Next";
                    nextBtn.disabled = true; // Must answer last question to finish
                }
            } else {
                nextBtn.textContent = "Next";
                // Allow navigation forward even if not answered? 
                // Usually yes for "Full Navigation Freedom", but standard behavior often requires answer.
                // Given "Full Navigation Freedom", let's allow it, but disable "Finish" on last page if no answer.
                nextBtn.disabled = false;
            }
        }

        function updateProgress() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const percentage = (answeredCount / quizData.length) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // --- RESULTS ---
        function showResults() {
            quizInterface.style.display = 'none';
            quizFooter.style.display = 'none'; // Hide nav controls
            viewListBtn.style.display = 'none'; // Hide list button
            
            resultScreen.style.display = 'block';
            document.getElementById('final-score').textContent = score;
            document.getElementById('total-questions').textContent = quizData.length;
        }

        // --- PATIENT LIST MODAL & GRID ---
        
        // Open Modal
        viewListBtn.onclick = () => {
            renderGrid();
            modal.style.display = 'flex';
        };

        // Close Modal
        closeModalBtn.onclick = () => {
            modal.style.display = 'none';
        };

        // Close on outside click
        window.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };

        // Render Grid
        function renderGrid() {
            gridContainer.innerHTML = '';
            quizData.forEach((_, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.textContent = index + 1;

                // Status Styling
                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                } else if (userAnswers[index] !== null) {
                    item.classList.add('answered');
                }

                // Jump Action
                item.onclick = () => {
                    currentQuestionIndex = index;
                    renderQuestion();
                    modal.style.display = 'none'; // Close modal on selection
                };

                gridContainer.appendChild(item);
            });
        }

        // Update Grid Styling without re-rendering content (performance)
        function updateGridStatus() {
            // Only if modal is open (or we could just update class lists in DOM)
            // For simplicity, we just re-render if opened. 
            // But if we want real-time updates while taking quiz:
            if (modal.style.display === 'flex') {
                renderGrid();
            }
        }

        // Start
        initQuiz();

    </script>
</body>
</html>
