    <style>
        /*

            justify-content: center;

            color: var(--text-color);

            background: #fff;
            border: 2px solid var(--med-blue);

            margin-top: 20px;
            margin-bottom: 80px; /* Space for fixed footer if needed, though we keep it inside card mostly */

            display: flex;
            flex-direction: column;

        header {
            border-bottom: 2px solid var(--med-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: Arial, sans-serif;
            color: var(--med-blue);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;

            font-family: Arial, sans-serif;

            color: var(--med-blue);

        /* Question Area */
        .question-area {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Interactive Elements: Rectangular, sharp/2px radius */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #ccc;
            border-left: 4px solid #ccc;
            padding: 15px;
            text-align: left;
            font-family: Arial, sans-serif;
            font-size: 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            background-color: var(--med-light-blue);
            border-left-color: var(--med-blue);
        }

        .option-btn.selected-correct {
            background-color: var(--med-light-blue);
            border-color: var(--med-green);
            border-left-color: var(--med-green);
        }

        .option-btn.selected-wrong {
            background-color: #ffebee;
            border-color: var(--med-red);
            border-left-color: var(--med-red);
        }

        .option-btn.disabled {
            cursor: default;
            opacity: 0.8;
        }

        /* Instant Feedback Text */
        .feedback {
            font-weight: bold;
            font-size: 14px;
            margin-left: 10px;
            white-space: nowrap;
        }

        .feedback.correct { color: var(--med-green); }
        .feedback.wrong { color: var(--med-red); }

        /* Explanation Box */
        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--med-blue);
            display: none; /* Hidden by default */
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-title {
            font-weight: bold;
            color: var(--med-blue);
            display: block;
            margin-bottom: 5px;
        }

        /* Navigation Area */
        .nav-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;

            border: 1px solid var(--med-blue);

            font-family: Arial, sans-serif;
            font-weight: bold;

            border-radius: 2px;
            text-transform: uppercase;

        }

        .nav-btn:hover {
            background-color: var(--med-blue);
            color: white;
        }

        .nav-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            background-color: transparent;
            cursor: not-allowed;
        }

        .view-list-btn {
            background-color: var(--med-blue);
            color: white;
            border: none;
        }

        .view-list-btn:hover {

        /* Result Screen */
        .result-screen {
            text-align: center;
            display: none;
            padding: 40px 20px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--med-blue);
            margin: 20px 0;
        }

        .result-details {
            font-size: 18px;
            color: #555;
        }

        /*

         */
        .branding-footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .credit-text {
            font-family: Arial, sans-serif;
            font-style: italic;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            display: block;
        }

        .social-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background-color: var(--med-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 18px;
            border-radius: 0; /* Square as requested */
            transition: background 0.3s;
        }

        .social-btn:hover {
            background-color: var(--med-blue-hover);
        }

        /* 
         * PART 3: QUESTION OVERLAY (GRID)
         */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .overlay-content {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border: 2px solid var(--med-blue);
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--med-blue);
            cursor: pointer;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        .patient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .grid-item {
            aspect-ratio: 1;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            background: #fff;
            transition: all 0.2s;
        }

        /* Grid Status Indicators */
        .grid-item.current {
            border: 2px solid var(--med-blue);
            box-shadow: 0 0 5px rgba(0,86,179, 0.4);
        }

        .grid-item.answered {
            background-color: var(--med-light-blue);
            color: var(--med-blue);
            border-color: var(--med-blue);
        }
        
        .grid-item:hover {
            transform: scale(1.05);
            border-color: var(--med-blue);
        }

    </style>
</head>

    <script>
        /* 
         * DATA SET 
         * 50 Questions derived from the provided content.
         * Correct answers identified based on the "Answer: ..." lines.
         */
        const quizData = [
            {
                q: "What are 'cervical alae'?",
                options: [
                    "a. Egg structures with polar plugs",
                    "b. Three wing-like cuticular expansions surrounding the mouth of the adult worm",
                    "c. Larval stages found in the lungs",
                    "d. Diagnostic features of tapeworm proglottids"
                ],
                answer: 1, // Index 0-3. b is correct.
                explanation: "Cervical alae are prominent lateral cuticular ridges or 'wings' near the anterior end of certain nematodes, especially Strongyloides stercoralis and Enterobius vermicularis. They are visible under microscopy and aid in species identification."
            },
            {
                q: "What does the term 'gravid female' refer to in parasitology?",
                options: [
                    "a. A female worm that has not yet mated",
                    "b. A female worm undergoing larval development",
                    "c. The female worm when its body is completely filled with thousands of eggs",
                    "d. A juvenile female worm in the soil"
                ],
                answer: 2,
                explanation: "A gravid female is a mature female helminth whose uterus is packed with eggs. In pinworms (Enterobius), she migrates nocturnally to the perianal region to deposit eggs, causing pruritus ani."
            },
            {
                q: "What does 'planoconvex' describe in parasitology?",
                options: [
                    "a. The shape of adult hookworms",
                    "b. The morphology of cysticerci",
                    "c. The characteristic shape of an egg that is flattened on one side and convex on the other",
                    "d. The appearance of schistosome miracidia"
                ],
                answer: 2,
                explanation: "Planoconvex is used to describe Enterobius vermicularis eggs, which are asymmetrical ovals, flattened on one side and rounded on the other. This distinguishes them from spherical or barrel-shaped eggs of other helminths."
            },
            {
                q: "Which method is commonly used to diagnose pinworm infection by demonstrating eggs?",
                options: [
                    "a. Stool concentration technique",
                    "b. Scotch tape method",
                    "c. Blood smear",
                    "d. Urine sedimentation"
                ],
                answer: 1,
                explanation: "The Scotch tape (cellophane tape) test involves applying transparent tape to the perianal skin early in the morning before bathing. Eggs adhere to the tape and are visualized microscopically. It is far more sensitive than stool examination for Enterobius."
            },
            {
                q: "What is 'pruritus ani' in the context of helminth infections?",
                options: [
                    "a. Itching of the scalp due to ectoparasites",
                    "b. Abdominal cramping from intestinal obstruction",
                    "c. Intense irritation and itching of the perianal area caused by crawling worms",
                    "d. Rash from allergic reaction to larval migration"
                ],
                answer: 2,
                explanation: "Pruritus ani is the hallmark symptom of enterobiasis (pinworm infection). It results from mechanical irritation and inflammatory response to female worms laying eggs around the anus, typically at night."
            },
            {
                q: "Which stage of Strongyloides stercoralis is most commonly detected in routine stool examination?",
                options: [
                    "a. Filariform larva",
                    "b. Adult male worm",
                    "c. Larvae in stool",
                    "d. Eggs"
                ],
                answer: 2,
                explanation: "Strongyloides stercoralis females are parthenogenetic and lay eggs that hatch within the intestine, so rhabditiform larvae (L1)—not eggs—are typically found in fresh stool. This is a key diagnostic feature."
            },
            {
                q: "What is 'hyperinfection' in strongyloidiasis?",
                options: [
                    "a. Mild increase in worm burden",
                    "b. Autoinfection limited to the gut",
                    "c. Severe form involving dissemination to multiple organs",
                    "d. Allergic reaction to antihelminthic drugs"
                ],
                answer: 2,
                explanation: "Hyperinfection syndrome occurs when immunosuppression (e.g., corticosteroids) triggers uncontrolled autoinfection, leading to massive larval dissemination to the lungs, CNS, liver, and other organs, often with Gram-negative sepsis. It is life-threatening."
            },
            {
                q: "What is the drug of choice for treating strongyloidiasis?",
                options: [
                    "a. Albendazole",
                    "b. Mebendazole",
                    "c. Praziquantel",
                    "d. Ivermectin"
                ],
                answer: 3,
                explanation: "Ivermectin is the drug of choice for Strongyloides stercoralis due to its superior efficacy against both adult worms and larvae. It is given as 200 µg/kg/day for 1–2 days, with possible repeat dosing in hyperinfection."
            },
            {
                q: "Where does free-living development of Strongyloides stercoralis occur in the environment?",
                options: [
                    "a. Dry sand",
                    "b. Saltwater",
                    "c. Moist soil",
                    "d. Freshwater lakes"
                ],
                answer: 2,
                explanation: "In favorable conditions (warm, moist soil), Strongyloides rhabditiform larvae can develop into free-living adults that reproduce independently. However, they can also transform into infective filariform larvae that penetrate human skin."
            },
            {
                q: "What pulmonary complication can result from larval migration of helminths like Ascaris or Strongyloides?",
                options: [
                    "a. Tuberculosis",
                    "b. Bronchopneumonia",
                    "c. Pulmonary embolism",
                    "d. Pleural effusion"
                ],
                answer: 1,
                explanation: "During the pulmonary phase of larval migration, nematode larvae (e.g., Ascaris, Strongyloides, hookworm) invade alveoli, causing eosinophilic bronchopneumonia—characterized by cough, wheezing, fever, and infiltrates on X-ray (Löffler’s syndrome)."
            },
            // Set 2 (Schistosomiasis)
            {
                q: "What is the drug of choice for treating schistosomiasis?",
                options: [
                    "a. Albendazole",
                    "b. Ivermectin",
                    "c. Praziquantel",
                    "d. Metronidazole"
                ],
                answer: 2,
                explanation: "Praziquantel is the first-line treatment for all major species of Schistosoma (S. mansoni, S. haematobium, S. japonicum). It causes rapid calcium influx into the parasite, leading to tegumental damage and immune-mediated clearance."
            },
            {
                q: "What is the miracidium?",
                options: [
                    "a. The infective stage that penetrates human skin",
                    "b. The encysted larval form on aquatic plants",
                    "c. The free-living, ciliated larval stage that hatches from eggs in water",
                    "d. The adult stage found in blood vessels"
                ],
                answer: 2,
                explanation: "The miracidium is a ciliated, free-swimming larva that emerges from Schistosoma or Fasciola eggs in freshwater. It actively seeks and penetrates a specific snail intermediate host to continue its development."
            },
            {
                q: "Which larval form is responsible for penetrating human skin in schistosomiasis?",
                options: [
                    "a. Miracidium",
                    "b. Sporocyst",
                    "c. Cercaria",
                    "d. Metacercaria"
                ],
                answer: 2,
                explanation: "The cercaria is the fork-tailed, free-swimming larval stage released by infected snails. It penetrates intact human skin during water contact, sheds its tail, and becomes a schistosomulum, which migrates to venous plexuses."
            },
            {
                q: "Which drug is an alternative treatment specifically for Schistosoma haematobium?",
                options: [
                    "a. Praziquantel",
                    "b. Triclabendazole",
                    "c. Metrifonate",
                    "d. Albendazole"
                ],
                answer: 2,
                explanation: "Metrifonate (an organophosphate) was historically used as an alternative for S. haematobium, especially where praziquantel was unavailable. However, it is less effective, requires multiple doses, and is no longer widely recommended due to toxicity and limited availability."
            },
            {
                q: "What is the intermediate snail host for Schistosoma haematobium?",
                options: [
                    "a. Biomphalaria species",
                    "b. Oncomelania species",
                    "c. Bulinus species",
                    "d. Lymnaea species"
                ],
                answer: 2,
                explanation: "S. haematobium uses freshwater snails of the genus Bulinus as its obligate intermediate host. This contrasts with S. mansoni (Biomphalaria) and S. japonicum (Oncomelania)."
            },
            // Hookworm (Mixed in provided text)
            {
                q: "What is the key diagnostic finding in stool examination for hookworm infection?",
                options: [
                    "a. Adult worms",
                    "b. Rhabditiform larvae",
                    "c. Hookworm egg",
                    "d. Cercariae"
                ],
                answer: 2,
                explanation: "Diagnosis of hookworm relies on identifying oval, thin-shelled, non-embryonated eggs in fresh stool. Each egg contains 4–8 blastomeres. Prompt examination is essential, as eggs hatch rapidly in warm conditions."
            },
            {
                q: "Which drug is commonly given as a single dose for the treatment of soil-transmitted helminths like hookworm?",
                options: [
                    "a. Praziquantel",
                    "b. Ivermectin",
                    "c. Albendazole",
                    "d. Metronidazole"
                ],
                answer: 2,
                explanation: "Albendazole 400 mg as a single oral dose is WHO-recommended for hookworm, ascariasis, and whipworm. It inhibits microtubule polymerization, leading to parasite death. Mebendazole is an alternative."
            },
            {
                q: "What is an effective preventive measure to avoid hookworm infection?",
                options: [
                    "a. Drinking boiled water",
                    "b. Wearing footwear",
                    "c. Using insect repellent",
                    "d. Avoiding raw fish"
                ],
                answer: 1,
                explanation: "Hookworm filariform larvae penetrate bare skin, usually the feet. Wearing shoes or sandals in endemic areas is a simple, highly effective prophylactic measure to prevent infection."
            },
            {
                q: "What type of anemia is typically seen in chronic hookworm infection?",
                options: [
                    "a. Macrocytic anemia",
                    "b. Hemolytic anemia",
                    "c. Hypochromic anemia",
                    "d. Aplastic anemia"
                ],
                answer: 2,
                explanation: "Hookworms cause chronic blood loss, leading to iron deficiency, which manifests as hypochromic, microcytic anemia (pale, small red blood cells). This is especially severe in children and pregnant women."
            },
            {
                q: "What best describes the morphology of a hookworm egg?",
                options: [
                    "a. Barrel-shaped with polar plugs",
                    "b. Spherical with thick shell",
                    "c. Oval, thin-shelled egg",
                    "d. Operculated and large"
                ],
                answer: 2,
                explanation: "Hookworm eggs are oval, thin-shelled, and contain 4–8 embryonic cells when passed in stool. They measure ~55–75 µm × 35–40 µm and are indistinguishable between Necator and Ancylostoma species."
            },
            // Trematodes General
            {
                q: "What is the first larval stage that hatches from the egg and penetrates a snail in trematode life cycles?",
                options: [
                    "a. Cercaria",
                    "b. Miracidium",
                    "c. Sporocyst",
                    "d. Redia"
                ],
                answer: 1,
                explanation: "The miracidium is the first larval stage that emerges from trematode eggs in water. It is ciliated and must locate and penetrate a compatible snail within hours to survive and develop into sporocysts."
            },
            {
                q: "What is the treatment of choice for fascioliasis?",
                options: [
                    "a. Praziquantel",
                    "b. Albendazole",
                    "c. Triclabendazole",
                    "d. Ivermectin"
                ],
                answer: 2,
                explanation: "Triclabendazole (10 mg/kg as a single dose, sometimes repeated after 12–24 hours) is the drug of choice for Fasciola hepatica and Fasciolopsis buski. It is effective against both juvenile and adult flukes. Praziquantel is NOT effective against Fasciola."
            },
            {
                q: "What is a common hematological finding in both acute and chronic phases of helminth infections like strongyloidiasis or schistosomiasis?",
                options: [
                    "a. Leukopenia",
                    "b. Thrombocytosis",
                    "c. Eosinophilia",
                    "d. Neutrophilia"
                ],
                answer: 2,
                explanation: "Eosinophilia (elevated eosinophil count) is a hallmark of tissue-invasive helminth infections. It reflects a T-helper 2 (Th2) immune response to larval migration or adult worm antigens and is prominent in acute schistosomiasis, strongyloidiasis, and fascioliasis."
            },
            {
                q: "Where do adult Clonorchis sinensis and Fasciola hepatica primarily reside in the human body?",
                options: [
                    "a. Intestinal lumen",
                    "b. Bloodstream",
                    "c. Biliary tract",
                    "d. Lungs"
                ],
                answer: 2,
                explanation: "Adult liver flukes (Clonorchis, Opisthorchis, Fasciola) live in the bile ducts (and gallbladder for Fasciola), causing inflammation, fibrosis, cholangitis, and increased risk of cholangiocarcinoma."
            },
            {
                q: "What term describes a trematode’s reproductive characteristic of having both male and female organs?",
                options: [
                    "a. Dioecious",
                    "b. Parthenogenetic",
                    "c. Hermaphrodite",
                    "d. Asexual"
                ],
                answer: 2,
                explanation: "Most trematodes (except Schistosoma) are hermaphroditic (monoecious), meaning each adult worm possesses both testes and ovaries and can self-fertilize or cross-fertilize. Schistosoma is dioecious (separate sexes)."
            },
            // Hookworm Lifecycle
            {
                q: "What is the infective stage of hookworm that penetrates human skin?",
                options: [
                    "a. Rhabditiform larva (L1)",
                    "b. Egg",
                    "c. Filariform larva (L3)",
                    "d. Adult worm"

                    "b. The tail of the worm",
                    "c. The head of the tapeworm used for attachment to the host’s mucosa",
                    "d. The larval cyst"
                ],
                answer: 2,
                explanation: "The scolex is the anterior attachment organ of cestodes, equipped with suckers (and hooks in T. solium) to anchor to the intestinal wall."
            },
            {
                q: "What are proglottids?",
                options: [
                    "a. Larval stages in intermediate hosts",
                    "b. Egg capsules",
                    "c. Individual segments of a tapeworm’s body that contain reproductive organs",
                    "d. Digestive structures"
                ],
                answer: 2,
                explanation: "Proglottids are repeating segments that make up the strobila (body) of tapeworms. They mature from neck to tail: immature → mature → gravid (filled with eggs)."
            },
            // Schistosomes specifics
            {
                q: "What are schistosomulae?",
                options: [
                    "a. Eggs released in urine",
                    "b. Miracidia in snails",
                    "c. Larvae that have shed their tails after entering the skin",
                    "d. Adult worms in blood vessels"
                ],
                answer: 2,
                explanation: "After cercariae penetrate human skin, they lose their forked tails and transform into schistosomulae, which enter venules and migrate to the liver to mature."
            },
            {
                q: "Which species of blood fluke is found in Thailand and Cambodia?",
                options: [
                    "a. Schistosoma mansoni",
                    "b. Schistosoma haematobium",
                    "c. Schistosoma japonicum",
                    "d. Schistosoma mekongi"
                ],
                answer: 3,
                explanation: "Schistosoma mekongi is endemic in the Mekong River basin (Laos, Cambodia). It uses Neotricula aperta snails and causes disease similar to S. japonicum."
            },
            {
                q: "What is cercarial dermatitis also known as?",
                options: [
                    "a. River blindness",
                    "b. Swimmer’s itch",
                    "c. Katayama fever",
                    "d. Löffler’s syndrome"
                ],
                answer: 1,
                explanation: "Cercarial dermatitis (“swimmer’s itch”) is a hypersensitivity reaction to non-human schistosome cercariae (e.g., from bird schistosomes) penetrating skin during water exposure. It causes pruritic papules but no systemic infection."
            },
            {
                q: "What is the Kato-Katz smear used for?",
                options: [
                    "a. Detecting blood parasites",
                    "b. Identifying skin fungi",
                    "c. A method used to demonstrate eggs in stool sample",
                    "d. Culturing bacteria"
                ],
                answer: 2,
                explanation: "The Kato-Katz thick smear is a quantitative stool technique used to detect and count helminth eggs (e.g., Schistosoma mansoni, soil-transmitted helminths), especially in field surveys."
            },
            {
                q: "What is Katayama fever?",
                options: [
                    "a. Chronic phase of schistosomiasis",
                    "b. The acute phase of the disease, often associated with S. japonicum",
                    "c. A form of liver cirrhosis",
                    "d. A skin manifestation of onchocerciasis"
                ],
                answer: 1,
                explanation: "Katayama fever is an acute systemic hypersensitivity reaction to migrating schistosomulae and egg antigens, occurring 2–8 weeks post-infection. Symptoms include fever, cough, hepatosplenomegaly, and eosinophilia—most severe with S. japonicum."
            },
            {
                q: "What is the primary drug of choice for treating schistosomiasis, typically given in 3 doses over 1 day?",
                options: [
                    "a. Albendazole",
                    "b. Ivermectin",
                    "c. Praziquantel",
                    "d. Triclabendazole"
                ],
                answer: 2,
                explanation: "Praziquantel is administered as 25 mg/kg three times in one day (total 75 mg/kg) for most Schistosoma species. It is safe, effective, and used in mass drug administration programs."
            },
            // Clonorchis Details
            {
                q: "Who is the principal definitive host for Clonorchis sinensis?",
                options: [
                    "a. Dog",
                    "b. Cat",
                    "c. Human",
                    "d. Pig"
                ],
                answer: 2,
                explanation: "While dogs, cats, and pigs can be infected, humans are the principal definitive host for Clonorchis sinensis in endemic areas of East Asia, where raw fish consumption is common."
            },
            {
                q: "What chronic complication of Clonorchis infection is linked to bile duct cancer?",
                options: [
                    "a. Hepatocellular carcinoma",
                    "b. Pancreatic adenocarcinoma",
                    "c. Cholangiocarcinoma",
                    "d. Gallbladder polyps"
                ],
                answer: 2,
                explanation: "Chronic Clonorchis sinensis infection causes periductal fibrosis, adenomatous hyperplasia, and is classified as a Group 1 carcinogen by IARC for cholangiocarcinoma (bile duct cancer)."
            },
            {
                q: "What is the common name for Clonorchis sinensis?",
                options: [
                    "a. Sheep liver fluke",
                    "b. Oriental lung fluke",
                    "c. Chinese liver fluke",
                    "d. Blood fluke"
                ],
                answer: 2,
                explanation: "Clonorchis sinensis is widely known as the Chinese liver fluke due to its high prevalence in China, Korea, Vietnam, and parts of Russia."
            },
            {
                q: "What is the infective form of Clonorchis sinensis acquired by eating undercooked fish?",
                options: [
                    "a. Miracidium",
                    "b. Cercaria",
                    "c. Metacercaria",
                    "d. Sporocyst"
                ],
                answer: 2,
                explanation: "Humans ingest metacercariae encysted in the flesh of freshwater cyprinoid fish. The cysts excyst in the duodenum, and juveniles migrate to the bile ducts to mature."
            },
            {
                q: "What is the diagnostic stage of Clonorchis sinensis commonly found in stool?",
                options: [
                    "a. Adult worm",
                    "b. Cercaria",
                    "c. Egg in feces",
                    "d. Metacercaria"
                ],
                answer: 2,
                explanation: "Diagnosis is confirmed by identifying small, operculated eggs (~26–30 µm) with a distinctive knob at the opposite end in stool. Eggs resemble Opisthorchis but are slightly larger."
            },
            // Enterobius & Ascaris Final
            {
                q: "What describes the posterior end of the male Enterobius vermicularis?",
                options: [
                    "a. Pin-like and straight",
                    "b. Blunt and rounded",
                    "c. Curved hook-like tail",
                    "d. Forked and motile"
                ],
                answer: 2,
                explanation: "The male pinworm is smaller (2–5 mm) and has a ventrally curved posterior end used to grasp the female during copulation—distinct from the female’s straight, pointed tail."
            },
            {
                q: "How long does it take for Ascaris eggs to develop into the infective stage in soil?",
                options: [
                    "a. 1–2 days",
                    "b. 5–7 days",
                    "c. 10–40 days",
                    "d. 60–90 days"
                ],
                answer: 2,
                explanation: "Under optimal conditions (warm, moist, shaded soil), Ascaris fertilized eggs embryonate and become infective in ~2–6 weeks (10–40 days)."
            },
            {
                q: "What drug is commonly used as a single dose to treat soil-transmitted helminths like ascariasis?",
                options: [
                    "a. Praziquantel",
                    "b. Ivermectin",
                    "c. Albendazole",
                    "d. Metronidazole"
                ],
                answer: 2,
                explanation: "Albendazole 400 mg single dose is WHO-recommended for Ascaris, hookworm, and (less effectively) Trichuris. It disrupts microtubule synthesis, leading to parasite death."
            },
            {
                q: "What is a key preventive measure to reduce Ascaris infection?",
                options: [
                    "a. Wearing shoes",
                    "b. Using bed nets",
                    "c. Personal hygiene",
                    "d. Avoiding freshwater"
                ],
                answer: 2,
                explanation: "Since Ascaris spreads via fecal-oral route, handwashing with soap, proper sanitation, washing/peeling raw vegetables, and safe disposal of feces are critical preventive measures."
            }
        ];

        /* 
         * STATE MANAGEMENT
         */
        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null); // Stores index of selected option
        let score = 0;

        /* 
         * DOM ELEMENTS
         */
        const els = {
            quizView: document.getElementById('quiz-view'),
            resultView: document.getElementById('result-view'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            explanationBox: document.getElementById('explanation-box'),
            explanationText: document.getElementById('explanation-text'),
            progressText: document.getElementById('progress-text'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            viewListBtn: document.getElementById('view-list-btn'),
            finalScore: document.getElementById('final-score'),
            resultMessage: document.getElementById('result-message'),
            gridOverlay: document.getElementById('grid-overlay'),
            gridContainer: document.getElementById('grid-container'),
            closeOverlay: document.getElementById('close-overlay')
        };

        /* 
         * INITIALIZATION
         */
        function initQuiz() {
            renderQuestion();
            renderGrid();
        }

        /* 
         * RENDER LOGIC 
         */
        function renderQuestion() {
            const data = quizData[currentQuestionIndex];
            
            // Update Text
            els.questionText.textContent = `${currentQuestionIndex + 1}. ${data.q}`;
            els.progressText.textContent = `Q ${currentQuestionIndex + 1} / ${quizData.length}`;
            
            // Update Navigation State
            els.prevBtn.disabled = currentQuestionIndex === 0;
            
            // Clear previous options
            els.optionsContainer.innerHTML = '';
            
            // Hide explanation initially
            els.explanationBox.style.display = 'none';

            // Determine if this question has already been answered
            const hasAnswered = userAnswers[currentQuestionIndex] !== null;

            // Render Options
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt}</span>`; // Text container
                
                // Feedback placeholder
                const feedbackSpan = document.createElement('span');
                feedbackSpan.className = 'feedback';
                btn.appendChild(feedbackSpan);

                if (hasAnswered) {
                    btn.classList.add('disabled');
                    // Show previously selected state
                    if (index === data.answer) {
                        btn.classList.add('selected-correct');
                        feedbackSpan.textContent = 'CORRECT';
                        feedbackSpan.classList.add('correct');
                    } else if (index === userAnswers[currentQuestionIndex]) {
                        btn.classList.add('selected-wrong');
                        feedbackSpan.textContent = 'INCORRECT';
                        feedbackSpan.classList.add('wrong');
                    }
                } else {
                    // Interaction Logic
                    btn.onclick = () => handleAnswerSelect(index, btn, feedbackSpan);
                }

                els.optionsContainer.appendChild(btn);
            });

            // If already answered, show explanation
            if (hasAnswered) {
                els.explanationText.textContent = data.explanation;
                els.explanationBox.style.display = 'block';
            }
        }

        function handleAnswerSelect(selectedIndex, btnElement, feedbackElement) {
            const data = quizData[currentQuestionIndex];
            
            // Lock the question
            userAnswers[currentQuestionIndex] = selectedIndex;
            
            // Update UI for immediate feedback
            const allBtns = els.optionsContainer.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.classList.add('disabled');
                b.onclick = null; // Remove listeners
            });

            if (selectedIndex === data.answer) {
                score++;
                btnElement.classList.add('selected-correct');
                feedbackElement.textContent = 'CORRECT';
                feedbackElement.classList.add('correct');
            } else {
                btnElement.classList.add('selected-wrong');
                feedbackElement.textContent = 'INCORRECT';
                feedbackElement.classList.add('wrong');
                
                // Highlight the correct one
                const correctBtn = allBtns[data.answer];
                const correctFeedback = correctBtn.querySelector('.feedback');
                correctBtn.classList.add('selected-correct');
                correctFeedback.textContent = 'CORRECT';
                correctFeedback.classList.add('correct');
            }

            // Show Explanation
            els.explanationText.textContent = data.explanation;
            els.explanationBox.style.display = 'block';

            // Update Grid Status
            renderGrid();

            // Check if it's the last question to change Next button behavior?
            // We handle that in the Next Button click handler logic
        }

        /* 
         * NAVIGATION HANDLERS 
         */
        els.prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        els.nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                // End of Quiz
                showResults();
            }
        });

        /* 
         * GRID OVERLAY LOGIC
         */
        els.viewListBtn.addEventListener('click', () => {
            renderGrid(); // Ensure latest state
            els.gridOverlay.style.display = 'flex';
        });

        els.closeOverlay.addEventListener('click', () => {
            els.gridOverlay.style.display = 'none';
        });

        // Close on outside click
        els.gridOverlay.addEventListener('click', (e) => {
            if (e.target === els.gridOverlay) {
                els.gridOverlay.style.display = 'none';
            }
        });

        function renderGrid() {
            els.gridContainer.innerHTML = '';
            
            quizData.forEach((_, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.textContent = index + 1;

                // Status classes
                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                }
                if (userAnswers[index] !== null) {
                    item.classList.add('answered');
                }

                // Jump Logic
                item.onclick = () => {
                    currentQuestionIndex = index;
                    renderQuestion();
                    els.gridOverlay.style.display = 'none';
                };

                els.gridContainer.appendChild(item);
            });
        }

        /* 
         * RESULTS LOGIC 
         */
        function showResults() {
            els.quizView.style.display = 'none';
            els.resultView.style.display = 'block';
            els.finalScore.textContent = `${score} / ${quizData.length}`;
            
            let msg = "";
            const percentage = (score / quizData.length) * 100;
            if (percentage >= 90) msg = "Outstanding performance.";
            else if (percentage >= 70) msg = "Good job, Doctor.";
            else if (percentage >= 50) msg = "Passing, but review is needed.";
            else msg = "Further study required.";
            
            els.resultMessage.textContent = msg;
        }

        // Start
        initQuiz();

    </script>
</body>
</html>
