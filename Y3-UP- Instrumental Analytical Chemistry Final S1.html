    <style>
        /* --- RESET & BASIC SETUP --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CLINICAL CONTAINER --- */
        .quiz-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border: 2px solid #0056b3; /* Medical Blue */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        /* Medical Chart Paper Background Effect */
        .chart-bg {
            flex-grow: 1;
            padding: 40px;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 100% 30px;
            overflow-y: auto;
            position: relative;
        }

        /* --- TYPOGRAPHY & HEADER --- */
        h1 {
            color: #0056b3;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            display: inline-block;
        }

        h2 {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .section-title {
            font-size: 14px;
            color: #0056b3;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #222;
        }

        /* --- QUESTION & OPTIONS --- */
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #000;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #ccc;
            padding: 12px 15px;
            text-align: left;
            font-family: Arial, sans-serif;
            font-size: 15px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            position: relative;
            outline: none;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e6f0ff;
            border-color: #0056b3;
        }

        .option-btn.correct {
            border: 2px solid #28a745;
            background-color: #f0fff4;
        }

        .option-btn.incorrect {
            border: 2px solid #dc3545;
            background-color: #fff5f5;
        }

        .feedback-badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 14px;
        }

        .feedback-correct { color: #28a745; }
        .feedback-incorrect { color: #dc3545; }

        .explanation-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0056b3;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #444;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- NAVIGATION BAR --- */
        .nav-bar {
            border-top: 1px solid #0056b3;
            padding: 15px 40px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-btn {
            background-color: #fff;
            border: 1px solid #0056b3;
            color: #0056b3;
            padding: 8px 20px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: #0056b3;
            color: #fff;
        }

        .nav-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }

        .view-list-btn {
            border: 1px solid #ccc;
            color: #555;
        }
        .view-list-btn:hover {
            background-color: #eee;
            color: #000;
            border-color: #555;
        }

        /* --- BRANDING & SOCIAL --- */
        .branding-footer {
            border-top: 1px solid #ddd;
            padding: 15px 40px;
            background-color: #fff;
            text-align: center;
        }

        .credit-text {
            font-style: italic;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }

        .social-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background-color: #0056b3;
            color: #fff;
            border: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.2s;
        }

        .social-btn:hover {
            background-color: #004494;
        }

        /* --- OVERVIEW MODAL --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            z-index: 20;
            padding: 40px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }

        .modal-title {
            color: #0056b3;
            font-size: 24px;
            font-weight: bold;
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: #0056b3;
            cursor: pointer;
            font-weight: bold;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 15px;
        }

        .grid-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            background-color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .grid-item.current {
            border-color: #0056b3;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.5);
        }

        .grid-item.answered {
            background-color: #cce5ff;
            border-color: #cce5ff;
        }

        .grid-item:hover {
            transform: scale(1.1);
            z-index: 2;
        }

        /* --- RESULT SCREEN --- */
        .result-screen {
            text-align: center;
            padding: 40px;
            display: none;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 100% 30px;
        }

        .result-title {
            font-size: 28px;
            color: #0056b3;
            margin-bottom: 20px;
            border-bottom: 2px solid #0056b3;
        }

        .score-display {
            font-size: 60px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .score-label {
            font-size: 18px;
            color: #666;
        }

        .hidden { display: none !important; }
    </style>
</head>

        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let score = 0;

        const questionContainer = document.getElementById('question-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const overviewModal = document.getElementById('overview-modal');
        const questionGrid = document.getElementById('question-grid');
        const quizContent = document.getElementById('quiz-content');
        const navBar = document.getElementById('nav-bar');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');

        function initQuiz() {
            renderQuestion();
            renderGrid();
            updateNavButtons();
        }

        function renderQuestion() {
            const data = quizData[currentQuestionIndex];
            const savedAnswer = userAnswers[currentQuestionIndex];
            
            let optionsHtml = '';
            data.options.forEach((opt, index) => {
                let className = 'option-btn';
                let feedbackHtml = '';
                
                if (savedAnswer !== null) {
                    className += ' disabled';
                    
                    if (index === data.correct) {
                        className += ' correct';
                        feedbackHtml = '<span class="feedback-badge feedback-correct">CORRECT</span>';
                    } else if (index === savedAnswer) {
                        className += ' incorrect';
                        feedbackHtml = '<span class="feedback-badge feedback-incorrect">INCORRECT</span>';
                    }
                }

                optionsHtml += `
                    <button class="${className}" onclick="selectAnswer(${index})" ${savedAnswer !== null ? 'disabled' : ''}>
                        ${opt}
                        ${feedbackHtml}
                    </button>
                `;
            });

            questionContainer.innerHTML = `
                <div class="section-title">${data.section}</div>
                <div class="question-text">${data.question}</div>
                <div class="options-grid">${optionsHtml}</div>
            `;

            renderGrid();
        }

        function selectAnswer(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return; 

            userAnswers[currentQuestionIndex] = selectedIndex;
            
            if (selectedIndex === quizData[currentQuestionIndex].correct) {
                score++;
            }

            renderQuestion();
            updateNavButtons();
            renderGrid();
        }

        function changeQuestion(direction) {
            const newIndex = currentQuestionIndex + direction;
            if (newIndex >= 0 && newIndex < quizData.length) {
                currentQuestionIndex = newIndex;
                renderQuestion();
                updateNavButtons();
            }
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            renderQuestion();
            updateNavButtons();
            toggleModal();
        }

        function updateNavButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerText = "Finish";
                nextBtn.onclick = showResults;
            } else {
                nextBtn.innerText = "Next";
                nextBtn.onclick = () => changeQuestion(1);
            }
        }

        function toggleModal() {
            const isVisible = overviewModal.style.display === 'flex';
            overviewModal.style.display = isVisible ? 'none' : 'flex';
            renderGrid();
        }

        function renderGrid() {
            questionGrid.innerHTML = '';
            quizData.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerText = index + 1;

                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                } else if (userAnswers[index] !== null) {
                    item.classList.add('answered');
                }

                item.onclick = () => jumpToQuestion(index);
                questionGrid.appendChild(item);
            });
        }

        function showResults() {
            let finalScoreCalc = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans === quizData[idx].correct) finalScoreCalc++;
            });

            finalScore.innerText = `${finalScoreCalc} / ${quizData.length}`;

            quizContent.classList.add('hidden');
            navBar.classList.add('hidden');
            resultScreen.style.display = 'flex';
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = new Array(quizData.length).fill(null);
            score = 0;
            
            quizContent.classList.remove('hidden');
            navBar.classList.remove('hidden');
            resultScreen.style.display = 'none';
            
            initQuiz();
        }

        initQuiz();
    </script>
