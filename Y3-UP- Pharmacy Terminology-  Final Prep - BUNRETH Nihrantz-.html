    <style>
        /* 
         * PART 1: CLEAN CLINICAL DESIGN 
         * Font: Arial
         * Colors: White, Light Grey Lines, Medical Blue (#0056b3)
         */
        :root {
            --med-blue: #0056b3;
            --med-blue-hover: #004494;
            --med-light-blue: #e6f0fa;
            --med-red: #d32f2f;
            --med-green: #2e7d32;
            --bg-color: #ffffff;
            --line-color: #e0e0e0;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            /* Sterile Background: Medical chart paper effect */
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 27px,
                var(--line-color) 28px
            );
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Container: Clean clipboard/digital tablet look */
        .quiz-container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border: 2px solid var(--med-blue);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            position: relative;
            margin-top: 20px;
            margin-bottom: 80px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 2px solid var(--med-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: Arial, sans-serif;
            color: var(--med-blue);
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-text {
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: var(--med-blue);
        }

        /* Question Area */
        .question-area {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Interactive Elements */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #ccc;
            border-left: 4px solid #ccc;
            padding: 15px;
            text-align: left;
            font-family: Arial, sans-serif;
            font-size: 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            background-color: var(--med-light-blue);
            border-left-color: var(--med-blue);
        }

        .option-btn.selected-correct {
            background-color: var(--med-light-blue);
            border-color: var(--med-green);
            border-left-color: var(--med-green);
        }

        .option-btn.selected-wrong {
            background-color: #ffebee;
            border-color: var(--med-red);
            border-left-color: var(--med-red);
        }

        .option-btn.disabled {
            cursor: default;
            opacity: 0.8;
        }

        /* Instant Feedback Text */
        .feedback {
            font-weight: bold;
            font-size: 14px;
            margin-left: 10px;
            white-space: nowrap;
        }

        .feedback.correct { color: var(--med-green); }
        .feedback.wrong { color: var(--med-red); }

        /* Explanation Box */
        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--med-blue);
            display: none;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-title {
            font-weight: bold;
            color: var(--med-blue);
            display: block;
            margin-bottom: 5px;
        }

        /* Navigation Area */
        .nav-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-btn {
            background-color: transparent;
            border: 1px solid var(--med-blue);
            color: var(--med-blue);
            padding: 10px 20px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .nav-btn:hover {
            background-color: var(--med-blue);
            color: white;
        }

        .nav-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            background-color: transparent;
            cursor: not-allowed;
        }

        .view-list-btn {
            background-color: var(--med-blue);
            color: white;
            border: none;
        }

        .view-list-btn:hover {
            background-color: var(--med-blue-hover);
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            display: none;
            padding: 40px 20px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--med-blue);
            margin: 20px 0;
        }

        .result-details {
            font-size: 18px;
            color: #555;
        }

        /* 
         * PART 2: BRANDING & SOCIAL MEDIA 
         */
        .branding-footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .credit-text {
            font-family: Arial, sans-serif;
            font-style: italic;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            display: block;
        }

        .social-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background-color: var(--med-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 18px;
            border-radius: 0;
            transition: background 0.3s;
        }

        .social-btn:hover {
            background-color: var(--med-blue-hover);
        }

        /* 
         * PART 3: QUESTION OVERLAY (GRID)
         */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .overlay-content {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border: 2px solid var(--med-blue);
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--med-blue);
            cursor: pointer;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        .patient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .grid-item {
            aspect-ratio: 1;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            background: #fff;
            transition: all 0.2s;
        }

        .grid-item.current {
            border: 2px solid var(--med-blue);
            box-shadow: 0 0 5px rgba(0,86,179, 0.4);
        }

        .grid-item.answered {
            background-color: var(--med-light-blue);
            color: var(--med-blue);
            border-color: var(--med-blue);
        }
        
        .grid-item:hover {
            transform: scale(1.05);
            border-color: var(--med-blue);
        }
    </style>
</head>

        /* 
         * STATE MANAGEMENT
         */
        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let score = 0;

        /* 
         * DOM ELEMENTS
         */
        const els = {
            quizView: document.getElementById('quiz-view'),
            resultView: document.getElementById('result-view'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            explanationBox: document.getElementById('explanation-box'),
            explanationText: document.getElementById('explanation-text'),
            progressText: document.getElementById('progress-text'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            viewListBtn: document.getElementById('view-list-btn'),
            finalScore: document.getElementById('final-score'),
            resultMessage: document.getElementById('result-message'),
            gridOverlay: document.getElementById('grid-overlay'),
            gridContainer: document.getElementById('grid-container'),
            closeOverlay: document.getElementById('close-overlay')
        };

        /* 
         * INITIALIZATION
         */
        function initQuiz() {
            renderQuestion();
            renderGrid();
        }

        /* 
         * RENDER LOGIC 
         */
        function renderQuestion() {
            const data = quizData[currentQuestionIndex];
            
            els.questionText.textContent = `${currentQuestionIndex + 1}. ${data.q}`;
            els.progressText.textContent = `Q ${currentQuestionIndex + 1} / ${quizData.length}`;
            
            els.prevBtn.disabled = currentQuestionIndex === 0;
            
            els.optionsContainer.innerHTML = '';
            els.explanationBox.style.display = 'none';

            const hasAnswered = userAnswers[currentQuestionIndex] !== null;

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt}</span>`;
                
                const feedbackSpan = document.createElement('span');
                feedbackSpan.className = 'feedback';
                btn.appendChild(feedbackSpan);

                if (hasAnswered) {
                    btn.classList.add('disabled');
                    if (index === data.answer) {
                        btn.classList.add('selected-correct');
                        feedbackSpan.textContent = 'CORRECT';
                        feedbackSpan.classList.add('correct');
                    } else if (index === userAnswers[currentQuestionIndex]) {
                        btn.classList.add('selected-wrong');
                        feedbackSpan.textContent = 'INCORRECT';
                        feedbackSpan.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => handleAnswerSelect(index, btn, feedbackSpan);
                }

                els.optionsContainer.appendChild(btn);
            });

            if (hasAnswered) {
                els.explanationText.textContent = data.explanation;
                els.explanationBox.style.display = 'block';
            }
        }

        function handleAnswerSelect(selectedIndex, btnElement, feedbackElement) {
            const data = quizData[currentQuestionIndex];
            userAnswers[currentQuestionIndex] = selectedIndex;
            
            const allBtns = els.optionsContainer.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.classList.add('disabled');
                b.onclick = null;
            });

            if (selectedIndex === data.answer) {
                score++;
                btnElement.classList.add('selected-correct');
                feedbackElement.textContent = 'CORRECT';
                feedbackElement.classList.add('correct');
            } else {
                btnElement.classList.add('selected-wrong');
                feedbackElement.textContent = 'INCORRECT';
                feedbackElement.classList.add('wrong');
                
                const correctBtn = allBtns[data.answer];
                const correctFeedback = correctBtn.querySelector('.feedback');
                correctBtn.classList.add('selected-correct');
                correctFeedback.textContent = 'CORRECT';
                correctFeedback.classList.add('correct');
            }

            els.explanationText.textContent = data.explanation;
            els.explanationBox.style.display = 'block';
            renderGrid();
        }

        /* 
         * NAVIGATION HANDLERS 
         */
        els.prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        els.nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        });

        /* 
         * GRID OVERLAY LOGIC
         */
        els.viewListBtn.addEventListener('click', () => {
            renderGrid();
            els.gridOverlay.style.display = 'flex';
        });

        els.closeOverlay.addEventListener('click', () => {
            els.gridOverlay.style.display = 'none';
        });

        els.gridOverlay.addEventListener('click', (e) => {
            if (e.target === els.gridOverlay) {
                els.gridOverlay.style.display = 'none';
            }
        });

        function renderGrid() {
            els.gridContainer.innerHTML = '';
            
            quizData.forEach((_, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.textContent = index + 1;

                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                }
                if (userAnswers[index] !== null) {
                    item.classList.add('answered');
                }

                item.onclick = () => {
                    currentQuestionIndex = index;
                    renderQuestion();
                    els.gridOverlay.style.display = 'none';
                };

                els.gridContainer.appendChild(item);
            });
        }

        /* 
         * RESULTS LOGIC 
         */
        function showResults() {
            els.quizView.style.display = 'none';
            els.resultView.style.display = 'block';
            els.finalScore.textContent = `${score} / ${quizData.length}`;
            
            let msg = "";
            const percentage = (score / quizData.length) * 100;
            if (percentage >= 90) msg = "Outstanding performance.";
            else if (percentage >= 70) msg = "Good job.";
            else if (percentage >= 50) msg = "Passing, but review is needed.";
            else msg = "Further study required.";
            
            els.resultMessage.textContent = msg;
        }

        initQuiz();

    </script>
