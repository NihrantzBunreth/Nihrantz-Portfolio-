        { q: "217. Allergic Bronchopulmonary Aspergillosis (ABPA) is most commonly seen in patients with:", options: ["A. Diabetes mellitus", "B. Hypertension", "C. Asthma or cystic fibrosis", "D. Rheumatoid arthritis"], correct: 2, expl: "ABPA is a hypersensitivity reaction prevalent in individuals with airway disease." },
        { q: "218. Which Aspergillus species produces aflatoxins, potent hepatocarcinogens?", options: ["A. A. niger", "B. A. terreus", "C. A. fumigatus", "D. A. flavus"], correct: 3, expl: "A. flavus produces aflatoxin B₁." },
        { q: "219. Otomycosis (fungal ear infection) is most commonly caused by:", options: ["A. Aspergillus fumigatus", "B. Aspergillus niger", "C. Penicillium chrysogenum", "D. Talaromyces marneffei"], correct: 1, expl: "A. niger is a frequent cause of external otomycosis." },
        { q: "220. Which organism is thermally dimorphic and endemic to Southeast Asia?", options: ["A. Aspergillus terreus", "B. Paecilomyces lilacinus", "C. Talaromyces marneffei", "D. Penicillium citrinum"], correct: 2, expl: "T. marneffei grows as a mold at 25°C and yeast at 37°C." },
        { q: "221. Which species is notable for intrinsic resistance to amphotericin B?", options: ["A. Aspergillus flavus", "B. Aspergillus terreus", "C. Aspergillus niger", "D. Aspergillus fumigatus"], correct: 1, expl: "A. terreus is resistant to amphotericin B." },
        { q: "222. Fungal keratitis linked to contact lens use is often caused by:", options: ["A. Aspergillus fumigatus", "B. Paecilomyces lilacinus", "C. Penicillium chrysogenum", "D. Talaromyces marneffei"], correct: 1, expl: "P. lilacinus causes severe eye infections." },
        { q: "223. Aflatoxin B₁ causes liver cancer primarily by:", options: ["A. Inhibiting protein synthesis", "B. Forming DNA adducts after hepatic activation", "C. Disrupting mitochondrial function", "D. Inducing autoimmune hepatitis"], correct: 1, expl: "Liver enzymes convert AFB₁ to a reactive epoxide that binds DNA." },
        { q: "224. Which food is at highest risk for aflatoxin contamination?", options: ["A. Rice", "B. Peanuts", "C. Apples", "D. Milk (pasteurized)"], correct: 1, expl: "Peanuts and corn stored in warm, humid conditions are prime substrates." },
        { q: "225. Chronic aflatoxin exposure in children is associated with:", options: ["A. Precocious puberty", "B. Stunted growth and cognitive impairment", "C. Hyperactivity disorder", "D. Dental fluorosis"], correct: 1, expl: "Aflatoxins suppress immunity and impair nutrient absorption." },
        { q: "226. The 2004 aflatoxicosis outbreak in Kenya resulted in over 100 deaths due to consumption of contaminated:", options: ["A. Wheat flour", "B. Maize (corn)", "C. Cassava", "D. Soybeans"], correct: 1, expl: "Poor storage of maize led to massive A. flavus contamination." },
        { q: "227. KOH preparation is used in mycology to:", options: ["A. Stain fungal DNA", "B. Dissolve human cells to reveal fungal elements", "C. Detect galactomannan", "D. Culture fungi rapidly"], correct: 1, expl: "KOH clears keratin and cellular debris." },
        { q: "228. Galactomannan testing is most useful for diagnosing:", options: ["A. Vulvovaginal candidiasis", "B. Cryptococcal meningitis", "C. Invasive aspergillosis", "D. Tinea capitis"], correct: 2, expl: "Galactomannan is a cell wall component of Aspergillus." },
        { q: "229. On Sabouraud Dextrose Agar, Aspergillus niger colonies appear:", options: ["A. Bright yellow with red reverse", "B. White turning jet-black", "C. Green with powdery texture", "D. Pink and mucoid"], correct: 1, expl: "Dark conidia give colonies a black, pepper-like appearance." },
        { q: "230. Which diagnostic method provides the fastest species identification?", options: ["A. Culture", "B. KOH mount", "C. PCR", "D. Galactomannan ELISA"], correct: 2, expl: "Molecular methods like PCR can identify species within hours." },
        { q: "231. Citric acid used in food and beverages is primarily produced by:", options: ["A. Penicillium chrysogenum", "B. Aspergillus terreus", "C. Aspergillus niger", "D. Talaromyces marneffei"], correct: 2, expl: "A. niger is the industrial workhorse for citric acid fermentation." },
        { q: "232. Lovastatin, the first cholesterol-lowering statin, was isolated from:", options: ["A. Aspergillus fumigatus", "B. Aspergillus terreus", "C. Penicillium citrinum", "D. Paecilomyces lilacinus"], correct: 1, expl: "Lovastatin inhibits HMG-CoA reductase." },
        { q: "233. Penicillin is industrially produced by:", options: ["A. Penicillium notatum", "B. Penicillium chrysogenum", "C. Aspergillus flavus", "D. Talaromyces funiculosus"], correct: 1, expl: "P. chrysogenum is a high-yield strain." },
        { q: "234. Which enzyme produced by Aspergillus is used in baking and brewing?", options: ["A. Lipase", "B. Amylase", "C. Catalase", "D. Urease"], correct: 1, expl: "Amylases break down starch into fermentable sugars." },
        { q: "235. Invasive aspergillosis most commonly originates in the:", options: ["A. Skin", "B. Gastrointestinal tract", "C. Lungs", "D. Urinary tract"], correct: 2, expl: "Inhalation of conidia leads to pulmonary infection." },
        { q: "236. Which condition is NOT caused by Aspergillaceae?", options: ["A. Otomycosis", "B. Keratitis", "C. Oral thrush", "D. Allergic bronchopulmonary aspergillosis"], correct: 2, expl: "Oral thrush is caused by Candida." },
        { q: "237. Indoor growth of Aspergillus is favored by:", options: ["A. Cold, dry environments", "B. UV light exposure", "C. Damp walls and poor ventilation", "D. High salt concentration"], correct: 2, expl: "Moisture and organic material support mold growth." },
        { q: "238. False-positive galactomannan tests can occur with which antibiotic?", options: ["A. Vancomycin", "B. Ceftriaxone", "C. Piperacillin-tazobactam", "D. Doxycycline"], correct: 2, expl: "Some beta-lactams contain fungal cell wall components." },
        { q: "239. Aflatoxin contamination is minimized by:", options: ["A. Refrigerating grains immediately after harvest", "B. Storing crops in dry, well-ventilated conditions", "C. Irradiating all nuts before sale", "D. Adding vinegar to stored corn"], correct: 1, expl: "Low moisture and temperature inhibit fungal growth." },
        { q: "240. Which statement about Aspergillaceae is TRUE?", options: ["A. All members are pathogenic to humans", "B. They cannot reproduce sexually", "C. They include both harmful pathogens and beneficial industrial fungi", "D. They lack cell walls"], correct: 2, expl: "While some cause disease, others are vital in biotechnology." },
        // LESSON 9 (241-270)
        { q: "241. What is the correct term for fungal infections of keratinized tissues?", options: ["A. Mycosis fungoides", "B. Dermatophytosis", "C. Sporotrichosis", "D. Chromoblastomycosis"], correct: 1, expl: "Dermatophytosis (tinea or ringworm) refers to infections caused by dermatophytes." },
        { q: "242. Despite its name, “ringworm” is caused by:", options: ["A. Parasitic worms", "B. Bacteria", "C. Fungi", "D. Viruses"], correct: 2, expl: "“Ringworm” describes the ring-like rash caused by dermatophyte fungi." },
        { q: "243. Which protein do dermatophytes uniquely digest to cause infection?", options: ["A. Collagen", "B. Elastin", "C. Keratin", "D. Albumin"], correct: 2, expl: "Dermatophytes secrete keratinase enzymes." },
        { q: "244. Modern taxonomy places dermatophytes in which family?", options: ["A. Aspergillaceae", "B. Gymnoascaceae", "C. Arthrodermataceae", "D. Trichocomaceae"], correct: 2, expl: "Dermatophytes are now classified under Arthrodermataceae." },
        { q: "245. The sexual (teleomorph) stage of Microsporum gypseum is known as:", options: ["A. Aspergillus gypseus", "B. Penicillium gypseum", "C. Arthroderma gypseum", "D. Talaromyces gypseum"], correct: 2, expl: "Dermatophytes have dual naming: asexual (anamorph) and sexual (teleomorph)." },
        { q: "246. Which genus infects skin and hair but NOT nails?", options: ["A. Trichophyton", "B. Epidermophyton", "C. Microsporum", "D. Candida"], correct: 2, expl: "Microsporum targets skin and hair." },
        { q: "247. Smooth, club-shaped macroconidia in clusters are characteristic of:", options: ["A. Trichophyton rubrum", "B. Microsporum canis", "C. Epidermophyton floccosum", "D. Aspergillus niger"], correct: 2, expl: "Epidermophyton produces distinctive smooth, clavate macroconidia." },
        { q: "248. Which genus is the most common cause of human dermatophytosis?", options: ["A. Microsporum", "B. Epidermophyton", "C. Trichophyton", "D. Paecilomyces"], correct: 2, expl: "Trichophyton species cause the majority of tinea infections." },
        { q: "249. Abundant microconidia are a hallmark of which genus?", options: ["A. Epidermophyton", "B. Microsporum", "C. Trichophyton", "D. Fusarium"], correct: 2, expl: "Trichophyton often lacks prominent macroconidia but produces numerous microconidia." },
        { q: "250. Rough, spindle-shaped macroconidia are seen in:", options: ["A. Trichophyton", "B. Epidermophyton", "C. Microsporum", "D. Candida albicans"], correct: 2, expl: "These thick-walled, multicellular macroconidia help differentiate Microsporum." },
        { q: "251. Anthropophilic dermatophytes primarily spread through:", options: ["A. Soil contact", "B. Animal bites", "C. Human-to-human contact or fomites", "D. Inhalation of spores"], correct: 2, expl: "Anthropophilic species thrive on humans and spread via contact." },
        { q: "252. Zoophilic dermatophytes typically cause infections that are:", options: ["A. Asymptomatic and chronic", "B. Mild with minimal inflammation", "C. Severe, acute, and inflammatory", "D. Systemic and life-threatening"], correct: 2, expl: "Due to poor host adaptation, zoophilic fungi provoke strong immune reactions." },
        { q: "253. Geophilic dermatophytes are commonly found in:", options: ["A. Human scalp", "B. Hospital ventilation systems", "C. Soil rich in keratin debris", "D. Refrigerated food"], correct: 2, expl: "Geophilic species decompose hair, feathers, and skin in soil." },
        { q: "254. Which ecological group causes the mildest symptoms in humans?", options: ["A. Zoophilic", "B. Geophilic", "C. Anthropophilic", "D. All cause equally severe disease"], correct: 2, expl: "Anthropophilic fungi are well-adapted to humans, causing chronic but less inflammatory infections." },
        { q: "255. The classic “ring” appearance in tinea corporis results from:", options: ["A. Bacterial co-infection", "B. Central necrosis due to toxins", "C. Active fungal growth at the periphery with central healing", "D. Autoimmune destruction of the center"], correct: 2, expl: "Hyphae advance outward seeking fresh keratin." },
        { q: "256. Dermatophytes normally infect only:", options: ["A. Living epidermal cells", "B. Subcutaneous fat", "C. Dead, keratinized tissue", "D. Blood vessels"], correct: 2, expl: "They cannot invade living tissue under normal conditions." },
        { q: "257. Majocchi’s granuloma occurs when dermatophytes invade:", options: ["A. The lungs", "B. Hair follicles and dermis", "C. The central nervous system", "D. Bone marrow"], correct: 1, expl: "This deep form occurs in immunocompromised individuals." },
        { q: "258. Adherence of dermatophytes to skin occurs within:", options: ["A. 24–48 hours", "B. 5–10 minutes", "C. 2–3 hours", "D. 1 week"], correct: 2, expl: "Arthroconidia bind rapidly to corneocytes via surface adhesins." },
        { q: "259. The primary target of most antifungal drugs used against dermatophytes is:", options: ["A. DNA replication", "B. Protein synthesis", "C. Ergosterol in the cell membrane", "D. Cell wall chitin"], correct: 2, expl: "Ergosterol is essential for fungal membrane integrity." },
        { q: "260. Terbinafine is classified as a(n):", options: ["A. Azole", "B. Polyene", "C. Allylamine", "D. Echinocandin"], correct: 2, expl: "Terbinafine inhibits squalene epoxidase." },
        { q: "261. Griseofulvin works by:", options: ["A. Inhibiting ergosterol synthesis", "B. Disrupting microtubule function during mitosis", "C. Binding to DNA", "D. Blocking RNA polymerase"], correct: 1, expl: "It interferes with spindle formation, halting fungal cell division." },
        { q: "262. Which drug is preferred for tinea capitis in children?", options: ["A. Fluconazole", "B. Clotrimazole", "C. Griseofulvin", "D. Caspofungin"], correct: 2, expl: "It deposits into growing hair, preventing reinvasion." },
        { q: "263. Azoles exert which type of antifungal effect?", options: ["A. Fungicidal", "B. Bacteriostatic", "C. Fungistatic", "D. Virucidal"], correct: 2, expl: "Azoles inhibit ergosterol synthesis but don’t kill fungi outright." },
        { q: "264. Topical antifungals are generally sufficient for:", options: ["A. Tinea capitis", "B. Onychomycosis", "C. Tinea corporis", "D. Majocchi’s granuloma"], correct: 2, expl: "Superficial skin infections respond well to topicals." },
        { q: "265. For onychomycosis, treatment duration is typically:", options: ["A. 3–7 days", "B. 2–4 weeks", "C. 6–12 weeks", "D. 6–12 months"], correct: 2, expl: "Oral terbinafine is usually given for ~12 weeks for toenails." },
        { q: "266. When applying topical antifungals for tinea corporis, you should:", options: ["A. Apply only to the red border", "B. Cover the entire body", "C. Extend application 2 cm beyond the visible rash", "D. Use only at night"], correct: 2, expl: "This ensures coverage of advancing hyphae." },
        { q: "267. Reinfection in tinea pedis can be reduced by:", options: ["A. Wearing occlusive boots daily", "B. Treating shoes with antifungal powder", "C. Avoiding all foot washing", "D. Using corticosteroid creams"], correct: 1, expl: "Fungal spores persist in footwear; decontamination is key." },
        { q: "268. The host immune response in dermatophytosis is primarily:", options: ["A. Type I hypersensitivity", "B. Type II cytotoxic reaction", "C. Type IV delayed-type hypersensitivity", "D. Complement-mediated lysis"], correct: 2, expl: "Symptoms like itching peak at 48–72 hours due to T-cell-mediated inflammation." },
        { q: "269. Which statement about dermatophytes is TRUE?", options: ["A. They produce aflatoxins", "B. They invade living tissue routinely", "C. They play a role in ecological keratin recycling", "D. They are part of the normal gut flora"], correct: 2, expl: "Geophilic species decompose hair, feathers, and skin in nature." },
        { q: "270. Why are topical antifungals ineffective for tinea capitis?", options: ["A. Scalp pH neutralizes the drug", "B. They cannot penetrate the hair shaft", "C. Trichophyton is resistant to all topicals", "D. The infection is viral"], correct: 1, expl: "The fungus resides inside the hair follicle and shaft—systemic drugs are required." },
        // LESSON 10 (271-300)
        { q: "271. To which plant family does Ricinus communis belong?", options: ["A. Solanaceae", "B. Euphorbiaceae", "C. Fabaceae", "D. Asteraceae"], correct: 1, expl: "Ricinus communis (castor oil plant) is a member of the spurge family, Euphorbiaceae." },
        { q: "272. What is the primary toxic component in castor seeds?", options: ["A. Ricinoleic acid", "B. Ricinin", "C. Ricin", "D. Nudiflorin"], correct: 2, expl: "Ricin is a highly potent glycoprotein toxin." },
        { q: "273. Why is commercial castor oil safe for human use?", options: ["A. It contains no fatty acids", "B. Ricin is lipid-soluble and removed during filtration", "C. Ricin is water-soluble and denatured by heat during processing", "D. The seeds used are genetically modified to be toxin-free"], correct: 2, expl: "Ricin does not dissolve in oil, and industrial heating destroys it." },
        { q: "274. Which compound gives castor oil its laxative effect?", options: ["A. Ricin", "B. Ricinin", "C. Ricinoleic acid", "D. Agglutinin RCA120"], correct: 2, expl: "Ricinoleic acid stimulates intestinal motility." },
        { q: "275. The seeds of Ricinus communis are dangerous only if:", options: ["A. Swallowed whole", "B. Inhaled as dust", "C. Chewed or crushed", "D. Touched with bare hands"], correct: 2, expl: "The hard seed coat protects against digestion; mechanical disruption releases ricin." },
        { q: "276. Ricin is classified as a:", options: ["A. Neurotoxin", "B. Hemolysin", "C. Type 2 Ribosome-Inactivating Protein (RIP)", "D. Ion channel blocker"], correct: 2, expl: "Ricin has an A-B structure that inactivates ribosomes." },
        { q: "277. The B-chain of ricin functions to:", options: ["A. Cleave ribosomal RNA", "B. Bind to galactose residues on cell surfaces", "C. Activate caspases", "D. Inhibit ATP synthase"], correct: 1, expl: "This binding triggers endocytosis." },
        { q: "278. Ricin’s A-chain enzymatically removes an adenine base from:", options: ["A. mRNA", "B. tRNA", "C. 28S rRNA in the 60S ribosomal subunit", "D. DNA promoter regions"], correct: 2, expl: "This depurination blocks elongation factor binding." },
        { q: "279. How many ribosomes can a single ricin molecule inactivate per minute?", options: ["A. 1–10", "B. ~100", "C. Thousands", "D. Millions"], correct: 2, expl: "Ricin is extremely efficient." },
        { q: "280. Cell death from ricin exposure occurs primarily via:", options: ["A. Necrosis only", "B. Apoptosis or necrosis", "C. Autophagy", "D. Pyroptosis"], correct: 1, expl: "Depending on dose and cell type, ricin can trigger programmed or uncontrolled cell death." },
        { q: "281. Ingestion of whole, intact castor seeds typically results in:", options: ["A. Severe ricin poisoning", "B. No toxicity", "C. Mild allergic reaction", "D. Immediate respiratory distress"], correct: 1, expl: "The seed coat resists digestion, preventing ricin release." },
        { q: "282. Onset of symptoms after ingestion of chewed castor seeds is usually within:", options: ["A. 30 minutes", "B. 1–2 hours", "C. 4–10 hours", "D. 24–48 hours"], correct: 2, expl: "Gastrointestinal symptoms appear several hours after ricin absorption begins." },
        { q: "283. Which symptom is NOT typical of ricin ingestion?", options: ["A. Bloody diarrhea", "B. Violent vomiting", "C. Seizures", "D. Severe abdominal pain"], correct: 2, expl: "Ricin causes GI, hepatic, and renal damage—but not direct CNS effects like seizures." },
        { q: "284. Inhalation of ricin leads to:", options: ["A. Skin blistering", "B. Pulmonary edema and respiratory failure", "C. Acute liver necrosis within 1 hour", "D. Hemolytic anemia"], correct: 1, expl: "Inhaled ricin damages alveolar cells, causing fluid leakage." },
        { q: "285. Injection of ricin is particularly lethal because it:", options: ["A. Causes immediate cardiac arrest", "B. Bypasses natural barriers and delivers toxin directly into circulation", "C. Triggers anaphylaxis", "D. Induces massive cytokine storm"], correct: 1, expl: "This route leads to rapid systemic distribution." },
        { q: "286. As of 2026, is there an approved antidote for ricin poisoning?", options: ["A. Yes – monoclonal antibody therapy", "B. Yes – small-molecule inhibitor", "C. No – only supportive care is available", "D. Yes – ricin vaccine"], correct: 2, expl: "No clinically approved antidote exists." },
        { q: "287. Activated charcoal is most effective in ricin ingestion if given:", options: ["A. Within 1 hour", "B. Within 6 hours", "C. Only after vomiting stops", "D. Never—it doesn’t bind ricin"], correct: 0, expl: "Early administration may reduce absorption." },
        { q: "288. Gastric lavage is generally discouraged in ricin poisoning because of risk of:", options: ["A. Hypoglycemia", "B. Aspiration and mucosal injury", "C. Delayed liver metabolism", "D. Cardiac arrhythmia"], correct: 1, expl: "Violent vomiting increases aspiration risk." },
        { q: "289. Key supportive treatment for ricin ingestion includes:", options: ["A. Corticosteroids", "B. Aggressive IV fluid resuscitation", "C. Antibiotics", "D. Anticonvulsants"], correct: 1, expl: "Fluid loss from vomiting/diarrhea can cause shock." },
        { q: "290. Which lab test is essential to monitor in ricin poisoning?", options: ["A. Blood glucose", "B. Liver and renal function tests", "C. Coagulation profile", "D. Arterial blood gas only"], correct: 1, expl: "Ricin causes hepatotoxicity and nephrotoxicity." },
        { q: "291. A child who chews one castor seed should be:", options: ["A. Observed at home", "B. Given syrup of ipecac", "C. Evaluated in an emergency department", "D. Treated with antibiotics"], correct: 2, expl: "Even partial ingestion poses risk in young children." },
        { q: "292. “Homemade castor seed tea” is dangerous because it:", options: ["A. Contains high levels of ricinoleic acid", "B. Releases ricin when seeds are crushed and steeped", "C. Causes vitamin toxicity", "D. Is contaminated with bacteria"], correct: 1, expl: "Crushing bypasses the protective seed coat." },
        { q: "293. Ricin is classified as a bioterror agent by the CDC under Category:", options: ["A. A", "B. B", "C. C", "D. Not classified"], correct: 1, expl: "Ricin is a Category B agent." },
        { q: "294. In a suspected inhalational ricin exposure, first responders should:", options: ["A. Administer epinephrine immediately", "B. Decontaminate skin/eyes and remove clothing", "C. Give oral activated charcoal", "D. Perform tracheostomy on-site"], correct: 1, expl: "External decontamination prevents ongoing exposure." },
        { q: "295. Post-mortem findings in ricin injection include all EXCEPT:", options: ["A. Local tissue necrosis at injection site", "B. Widespread organ apoptosis", "C. Severe gastrointestinal inflammation", "D. Ricin detectable in blood"], correct: 2, expl: "GI damage occurs only with ingestion." },
        { q: "296. Which use of Ricinus communis is SAFE?", options: ["A. Making jewelry from raw seeds", "B. Brewing leaf tea for fever", "C. Using commercial castor oil as a laxative", "D. Burning dried stems for incense"], correct: 2, expl: "Properly processed castor oil contains no active ricin." },
        { q: "297. Leaves of the castor plant can cause:", options: ["A. Ricin poisoning if eaten", "B. Allergic dermatitis", "C. Neurological paralysis", "D. Hemolysis"], correct: 1, expl: "Leaves contain allergenic proteins but negligible ricin." },
        { q: "298. Public health efforts should discourage planting castor beans near:", options: ["A. Industrial zones", "B. Playgrounds and daycares", "C. Adult fitness centers", "D. Parking lots"], correct: 1, expl: "Curious children may handle or chew the seeds." },
        { q: "299. Which statement about ricin detection is TRUE?", options: ["A. Rapid urine dipstick tests are widely available", "B. Diagnosis is clinical only—no lab confirmation possible", "C. Specialized immunoassays or mass spectrometry can detect ricin in serum/urine", "D. PCR detects ricin gene in patient blood"], correct: 2, expl: "Confirmation requires reference labs." },
        { q: "300. The key reason ricin is so deadly is that it:", options: ["A. Destroys red blood cells", "B. Paralyzes respiratory muscles", "C. Irreversibly halts cellular protein synthesis", "D. Causes massive histamine release"], correct: 2, expl: "Without new proteins, cells cannot function or repair." }
    ];

    // State Variables
    let currentQuestionIndex = 0;
    let userAnswers = new Array(rawQuestions.length).fill(null); // Stores index of selected answer
    let score = 0;

    // DOM Elements
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationBox = document.getElementById('explanation-box');
    const progressTracker = document.getElementById('progress-tracker');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const quizView = document.getElementById('quiz-view');
    const resultView = document.getElementById('result-view');
    const controlsArea = document.getElementById('controls-area');
    const finalScoreEl = document.getElementById('final-score');
    const resultMessageEl = document.getElementById('result-message');
    
    // Modal Elements
    const gridModal = document.getElementById('grid-modal');
    const gridContainer = document.getElementById('grid-container');

    // Initialize Quiz
    function initQuiz() {
        currentQuestionIndex = 0;
        userAnswers = new Array(rawQuestions.length).fill(null);
        score = 0;
        quizView.style.display = 'block';
        resultView.style.display = 'none';
        controlsArea.style.display = 'flex';
        renderQuestion();
        renderGrid();
    }

    // Render Question
    function renderQuestion() {
        const q = rawQuestions[currentQuestionIndex];
        
        // Update Text
        questionText.textContent = q.q;
        progressTracker.textContent = `Question ${currentQuestionIndex + 1} / ${rawQuestions.length}`;
        
        // Clear previous options
        optionsContainer.innerHTML = '';
        explanationBox.style.display = 'none';

        // Render Options
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            // Option Label
            const label = document.createElement('span');
            label.textContent = opt;
            btn.appendChild(label);

            // Check if already answered
            const selected = userAnswers[currentQuestionIndex];
            
            if (selected !== null) {
                btn.classList.add('disabled');
                
                // Show Feedback
                const feedback = document.createElement('span');
                feedback.className = 'feedback-label';

                if (index === q.correct) {
                    btn.classList.add('correct');
                    feedback.textContent = 'CORRECT';
                    feedback.classList.add('text-green');
                    btn.appendChild(feedback);
                } else if (index === selected) {
                    btn.classList.add('incorrect');
                    feedback.textContent = 'INCORRECT';
                    feedback.classList.add('text-red');
                    btn.appendChild(feedback);
                }
            } else {
                // Add Click Event
                btn.onclick = () => handleAnswer(index);
            }

            optionsContainer.appendChild(btn);
        });

        // Show Explanation if answered
        if (userAnswers[currentQuestionIndex] !== null) {
            explanationBox.textContent = `Explanation: ${q.expl}`;
            explanationBox.style.display = 'block';
        }

        // Update Nav Buttons
        prevBtn.disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === rawQuestions.length - 1) {
            nextBtn.textContent = 'Finish';
            nextBtn.onclick = finishQuiz;
        } else {
            nextBtn.textContent = 'Next';
            nextBtn.onclick = nextQuestion;
        }

        // Update Grid Highlight
        updateGridStatus();
    }

    // Handle Answer Click
    function handleAnswer(selectedIndex) {
        const q = rawQuestions[currentQuestionIndex];
        userAnswers[currentQuestionIndex] = selectedIndex;

        if (selectedIndex === q.correct) {
            score++;
        }

        renderQuestion(); // Re-render to show feedback
        renderGrid(); // Update grid colors
    }

    // Navigation
    function nextQuestion() {
        if (currentQuestionIndex < rawQuestions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    // Finish Quiz
    function finishQuiz() {
        quizView.style.display = 'none';
        controlsArea.style.display = 'none';
        resultView.style.display = 'block';
        
        finalScoreEl.textContent = `${score} / ${rawQuestions.length}`;
        
        let percentage = (score / rawQuestions.length) * 100;
        if (percentage >= 80) resultMessageEl.textContent = "Excellent performance.";
        else if (percentage >= 50) resultMessageEl.textContent = "Good effort. Review missed questions.";
        else resultMessageEl.textContent = "Needs improvement.";
    }

    // Restart
    function restartQuiz() {
        initQuiz();
    }

    // Grid Logic
    function renderGrid() {
        gridContainer.innerHTML = '';
        rawQuestions.forEach((_, index) => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.textContent = index + 1;
            item.onclick = () => jumpToQuestion(index);
            
            if (userAnswers[index] !== null) {
                item.classList.add('answered');
            }
            
            if (index === currentQuestionIndex) {
                item.classList.add('current');
            }
            
            gridContainer.appendChild(item);
        });
    }

    function updateGridStatus() {
        // Just re-render class changes without destroying DOM
        const items = gridContainer.children;
        for (let i = 0; i < items.length; i++) {
            items[i].classList.remove('current');
            if (i === currentQuestionIndex) {
                items[i].classList.add('current');
            }
        }
    }

    function toggleGrid() {
        if (gridModal.style.display === 'flex') {
            gridModal.style.display = 'none';
        } else {
            renderGrid(); // Ensure fresh state
            gridModal.style.display = 'flex';
        }
    }

    function jumpToQuestion(index) {
        currentQuestionIndex = index;
        renderQuestion();
        toggleGrid(); // Close modal
    }

    // Start App
    initQuiz();

</script>
</body>
</html>
