        // --- DATA ---
        const quizData = [
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q1. What percentage of circulating white blood cells do lymphocytes typically constitute in a healthy adult?",
                options: ["A) 5%–15%", "B) 18%–42%", "C) 50%–70%", "D) 70%–90%"],
                correct: 1, // Index of correct answer
                explanation: "Lymphocytes make up 18% to 42% of total leukocytes in peripheral blood. Neutrophils dominate (50–70%), while lymphocytes are the second most abundant in adults. Absolute lymphocyte count: 0.8–4.8 × 10⁹/L."
            },
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q2. Which of the following cell types is derived from the common lymphoid progenitor (CLP) but belongs to the innate immune system?",
                options: ["A) B cell", "B) Helper T cell", "C) Cytotoxic T cell", "D) Natural Killer (NK) cell"],
                correct: 3,
                explanation: "B and T cells → adaptive immunity (antigen-specific, memory). NK cells → innate immunity (no memory, rapid response). All three arise from the CLP, but NK cells lack rearranged antigen receptors."
            },
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q3. Lymphopoiesis refers specifically to:",
                options: ["A) Production of all white blood cells", "B) Maturation of erythrocytes", "C) Development of lymphocytes from progenitor cells", "D) Differentiation of myeloid precursors"],
                correct: 2,
                explanation: "Lymphopoiesis = formation of B, T, and NK cells from hematopoietic stem cells via the common lymphoid progenitor (CLP). Myelopoiesis produces granulocytes, monocytes, etc."
            },
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q4. Which of the following best describes naive lymphocytes?",
                options: ["A) Lymphocytes that have encountered antigen and differentiated into effectors", "B) Mature lymphocytes that have never encountered their specific antigen", "C) Immature lymphocytes still undergoing gene rearrangement in primary organs", "D) Plasma cells secreting antibodies"],
                correct: 1,
                explanation: "Naive lymphocytes are immunocompetent (functional receptors) but antigen-inexperienced. They circulate through secondary lymphoid organs waiting for antigen encounter."
            },
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q5. The primary lymphoid organs for lymphocyte development include:",
                options: ["A) Spleen and lymph nodes", "B) Bone marrow and thymus", "C) Tonsils and Peyer’s patches", "D) Liver and spleen"],
                correct: 1,
                explanation: "Bone marrow: site of B cell and NK cell maturation. Thymus: site of T cell maturation. Spleen, lymph nodes, GALT = secondary lymphoid organs (antigen encounter)."
            },
            {
                section: "Section 1: Overview & General Concepts",
                question: "Q6. Which statement about NK cells is TRUE?",
                options: ["A) They require prior sensitization to kill target cells", "B) They express rearranged T cell receptors", "C) They are part of adaptive immunity", "D) They kill cells lacking MHC class I molecules"],
                correct: 3,
                explanation: "NK cells use “missing self” recognition: normal cells express MHC-I, which engages inhibitory receptors on NK cells. Virus-infected or tumor cells often downregulate MHC-I → loss of inhibition → NK activation and killing."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q7. In adults, B lymphocytes primarily develop in the:",
                options: ["A) Thymus", "B) Liver", "C) Bone marrow", "D) Spleen"],
                correct: 2,
                explanation: "Fetus: B cells develop in liver. Adults: Bone marrow is the primary site. Stages: Pro-B → Pre-B → Immature B → Naive B."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q8. The key genetic event that generates diversity in B cell receptors is:",
                options: ["A) Somatic hypermutation", "B) Class switch recombination", "C) V(D)J recombination", "D) Gene duplication"],
                correct: 2,
                explanation: "V(D)J recombination occurs during pro-B to pre-B transition. Random recombination of Variable (V), Diversity (D), and Joining (J) gene segments creates unique BCRs. Somatic hypermutation & class switching happen after antigen exposure in germinal centers."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q9. Which CD markers are considered pan-B cell markers expressed from early development through maturity?",
                options: ["A) CD3 and CD4", "B) CD16 and CD56", "C) CD19 and CD20", "D) CD8 and CD28"],
                correct: 2,
                explanation: "CD19: signaling molecule, present from pro-B stage onward. CD20: expressed from pre-B to mature B cells (lost on plasma cells). Rituximab, a monoclonal antibody used in B-cell lymphomas, targets CD20."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q10. A mature naive B cell expresses which immunoglobulin classes on its surface?",
                options: ["A) IgM only", "B) IgG and IgA", "C) IgM and IgD", "D) IgE and IgA"],
                correct: 2,
                explanation: "Due to alternative mRNA splicing, a single B cell co-expresses IgM and IgD with identical antigen specificity. This occurs after successful heavy chain rearrangement and light chain assembly."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q11. Upon encountering its specific antigen in a lymph node, a naive B cell can differentiate into:",
                options: ["A) Cytotoxic T cells and memory T cells", "B) Plasma cells and memory B cells", "C) NK cells and dendritic cells", "D) Macrophages and neutrophils"],
                correct: 1,
                explanation: "Plasma cells: antibody-secreting factories (short-lived or long-lived in bone marrow). Memory B cells: persist for years, enable rapid secondary response."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q12. Which component of the B cell receptor (BCR) is essential for signal transduction after antigen binding?",
                options: ["A) Heavy chain", "B) Light chain", "C) Igα (CD79a) and Igβ (CD79b)", "D) Fc region"],
                correct: 2,
                explanation: "The membrane-bound antibody (Ig) binds antigen but cannot signal alone. Igα/Igβ heterodimer contains ITAM motifs that initiate intracellular signaling cascades."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q13. T-independent antigens typically activate B cells by:",
                options: ["A) Requiring CD4⁺ T cell help via MHC II", "B) Engaging Toll-like receptors and cross-linking BCRs", "C) Inducing somatic hypermutation", "D) Triggering class switch to IgG"],
                correct: 1,
                explanation: "T-independent antigens (e.g., bacterial polysaccharides) have repeating epitopes that strongly cross-link BCRs. May also engage TLRs (e.g., LPS → TLR4). Result: IgM production only, no memory, no class switching."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q14. Which antibody class is first produced during a primary immune response?",
                options: ["A) IgG", "B) IgA", "C) IgM", "D) IgE"],
                correct: 2,
                explanation: "IgM is the first antibody secreted by plasma cells in a primary response. Pentameric structure → high avidity, effective at complement activation."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q15. The variable regions of immunoglobulin heavy and light chains are responsible for:",
                options: ["A) Binding to phagocyte Fc receptors", "B) Activating the complement system", "C) Antigen recognition and specificity", "D) Transmembrane anchoring"],
                correct: 2,
                explanation: "Variable (V) regions form the antigen-binding site (paratope). Constant (C) regions determine effector functions (e.g., complement, opsonization)."
            },
            {
                section: "Section 2: B Cell Development & Markers",
                question: "Q16. Plasma cells are characterized by:",
                options: ["A) High surface IgM and CD19 expression", "B) Abundant rough endoplasmic reticulum and antibody secretion", "C) Expression of CD3 and TCR", "D) Ability to proliferate extensively upon antigen re-exposure"],
                correct: 1,
                explanation: "Plasma cells are antibody factories → packed with RER for protein synthesis. They downregulate surface Ig and CD19/20, and do not divide."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q17. T lymphocytes mature in which organ?",
                options: ["A) Bone marrow", "B) Spleen", "C) Thymus", "D) Liver"],
                correct: 2,
                explanation: "T cell precursors originate in bone marrow but migrate to the thymus for maturation. Thymus is most active in fetal life and childhood."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q18. During T cell development in the thymus, positive selection ensures that T cells:",
                options: ["A) Recognize self-MHC molecules", "B) Do not react to self-antigens", "C) Express both CD4 and CD8", "D) Can kill tumor cells"],
                correct: 0,
                explanation: "Positive selection (cortex): T cells that bind weakly to self-MHC survive → ensures MHC restriction. Negative selection (medulla): eliminates T cells with strong reactivity to self-antigens → prevents autoimmunity."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q19. Which CD marker is present on all mature T cells and is part of the TCR complex?",
                options: ["A) CD4", "B) CD8", "C) CD3", "D) CD20"],
                correct: 2,
                explanation: "CD3 is a signaling complex associated with the TCR. Expressed on all mature T cells, used to identify total T cell population."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q20. A normal CD4:CD8 ratio in peripheral blood is approximately:",
                options: ["A) 0.5:1", "B) 1:1", "C) 2:1", "D) 4:1"],
                correct: 2,
                explanation: "CD4⁺ (helper) T cells: ~60–80% of T cells. CD8⁺ (cytotoxic) T cells: ~20–35%. Ratio decreases in HIV/AIDS due to CD4⁺ depletion."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q21. Cytotoxic T cells (Tc) recognize antigen presented by:",
                options: ["A) MHC class II on B cells", "B) MHC class I on all nucleated cells", "C) Free-floating antigens in plasma", "D) NK cell receptors"],
                correct: 1,
                explanation: "CD8⁺ T cells bind peptide + MHC-I complexes. MHC-I is expressed on all nucleated cells, allowing surveillance of intracellular infections."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q22. Which T cell subset is critical for activating macrophages to kill intracellular bacteria like Mycobacterium tuberculosis?",
                options: ["A) Cytotoxic T cells (CD8⁺)", "B) Regulatory T cells (Treg)", "C) Helper T cells (CD4⁺)", "D) γδ T cells"],
                correct: 2,
                explanation: "Th1 subset of CD4⁺ T cells secretes IFN-γ, which activates macrophages to enhance microbicidal activity."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q23. The T cell receptor (TCR) differs from the B cell receptor (BCR) in that the TCR:",

                correct: 2,
                explanation: "TCR never secreted; only exists as membrane receptor. Recognizes linear peptides bound to MHC, not free/native antigens."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q24. Which of the following is true about γδ T cells?",

                correct: 1,
                explanation: "γδ T cells (<10% of T cells) are enriched in gut, skin, lungs. Recognize phosphoantigens, heat shock proteins — not MHC-restricted."
            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q25. Poor thymic development in early life would most likely result in:",

                explanation: "Thymus is essential for T cell maturation. Absence → T⁻ B⁺ NK⁺ SCID (e.g., DiGeorge syndrome)."

            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q26. Which molecule is used clinically to deplete B cells in autoimmune diseases and lymphomas?",

                explanation: "Rituximab is a monoclonal antibody against CD20, used in RA, SLE, B-cell NHL."
            },
            {
                section: "Section 3: T Cell Development & Markers",

            },
            {
                section: "Section 3: T Cell Development & Markers",
                question: "Q28. Which cytokine is primarily secreted by helper T cells to stimulate B cell antibody production?",

            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q29. Which CD markers are characteristic of mature, cytotoxic NK cells?",
                options: ["A) CD56ᵇʳⁱᵍʰᵗ CD16ˡᵒʷ", "B) CD56ᵈⁱᵐ CD16ʰⁱᵍʰ", "C) CD3⁺ CD56⁺", "D) CD19⁺ CD20⁺"],

            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q31. Which of the following is NOT a function of NK cells?",
                options: ["A) Killing virus-infected cells", "B) Producing antigen-specific memory", "C) Secreting IFN-γ", "D) Eliminating tumor cells with low MHC-I"],
                correct: 1,
                explanation: "NK cells are innate → no memory (though some 'adaptive NK' subsets exist, this is not classical memory)."
            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q32. NK cell inhibitory receptors primarily recognize:",
                options: ["A) Viral proteins", "B) Stress-induced ligands", "C) MHC class I molecules", "D) Bacterial LPS"],
                correct: 2,
                explanation: "Inhibitory receptors (e.g., KIRs) bind self-MHC-I → deliver “off” signal. Loss of MHC-I (e.g., by viruses) → disinhibition → killing."
            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q33. Compared to cytotoxic T cells (CTLs), NK cells:",
                options: ["A) Require several days to become active after infection", "B) Recognize specific peptide-MHC complexes", "C) Respond within hours and do not require prior sensitization", "D) Are part of adaptive immunity"],
                correct: 2,
                explanation: "NK cells provide immediate defense before adaptive response kicks in (~5–7 days for CTLs)."
            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q34. Which cytokine enhances NK cell activity and is produced by activated macrophages?",
                options: ["A) IL-4", "B) IL-12", "C) IL-10", "D) TGF-β"],
                correct: 1,
                explanation: "IL-12 (from macrophages/dendritic cells) → boosts NK cytotoxicity and IFN-γ production."
            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q35. NK cells are classified as:",
                options: ["A) Adaptive lymphocytes", "B) Myeloid-derived cells", "C) Innate Lymphoid Cells (ILCs)", "D) Antigen-presenting cells"],
                correct: 2,
                explanation: "NK cells are Group 1 ILCs, sharing developmental pathways but lacking antigen-specific receptors."
            },
            {
                section: "Section 4: NK Cells & Functional Integration",
                question: "Q36. The main mechanism by which NK cells kill target cells is:",
                options: ["A) Phagocytosis", "B) Release of perforin and granzymes", "C) Complement activation", "D) Opsonization"],
                correct: 1,
                explanation: "Perforin forms pores in target membrane. Granzymes enter and activate caspases → apoptosis."
            },
            {
                section: "Section 5: Integration & Clinical Correlation",
                question: "Q37. In HIV infection, the most significant decline occurs in which lymphocyte subset?",
                options: ["A) CD8⁺ T cells", "B) B cells", "C) CD4⁺ T cells", "D) NK cells"],
                correct: 2,
                explanation: "HIV binds CD4 and coreceptors (CCR5/CXCR4) → infects and destroys helper T cells → low CD4 count, inverted CD4:CD8 ratio."
            },
            {
                section: "Section 5: Integration & Clinical Correlation",
                question: "Q38. A patient with DiGeorge syndrome is most likely to have a deficiency in:",
                options: ["A) B cells", "B) NK cells", "C) T cells", "D) Neutrophils"],
                correct: 2,
                explanation: "DiGeorge = 22q11 deletion → thymic hypoplasia → impaired T cell development → T⁻ B⁺ NK⁺ SCID."
            },
            {
                section: "Section 5: Integration & Clinical Correlation",
                question: "Q39. Which of the following best describes the role of MHC in T cell function?",
                options: ["A) MHC presents free antigens to B cells", "B) MHC allows T cells to recognize unprocessed antigens", "C) MHC presents processed peptides to T cells", "D) MHC is only expressed on red blood cells"],
                correct: 2,
                explanation: "MHC-I: endogenous peptides (viruses) → CD8⁺ T cells. MHC-II: exogenous peptides (bacteria) → CD4⁺ T cells."
            },
            {
                section: "Section 5: Integration & Clinical Correlation",
                question: "Q40. Which statement correctly contrasts B and T lymphocytes?",
                options: ["A) B cells recognize processed peptides; T cells recognize native antigens", "B) B cells mature in the thymus; T cells mature in bone marrow", "C) B cells secrete antibodies; T cells do not", "D) B cells are part of innate immunity; T cells are adaptive"],
                correct: 2,
                explanation: "Only B cells differentiate into plasma cells that secrete antibodies. T cells act via cell-cell contact or cytokines, never secrete immunoglobulins."
            }
        ];

        // --- STATE MANAGEMENT ---
        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null); // Stores index of selected option
        let score = 0;

        // --- DOM ELEMENTS ---
        const questionContainer = document.getElementById('question-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const overviewModal = document.getElementById('overview-modal');
        const questionGrid = document.getElementById('question-grid');
        const quizContent = document.getElementById('quiz-content');
        const navBar = document.getElementById('nav-bar');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');

        // --- INITIALIZATION ---
        function initQuiz() {
            renderQuestion();
            renderGrid();
            updateNavButtons();
        }

        // --- RENDER QUESTION ---
        function renderQuestion() {
            const data = quizData[currentQuestionIndex];
            const savedAnswer = userAnswers[currentQuestionIndex];
            
            let optionsHtml = '';
            data.options.forEach((opt, index) => {
                let className = 'option-btn';
                let feedbackHtml = '';
                
                // If this question has been answered
                if (savedAnswer !== null) {
                    // Disable all buttons for answered questions
                    className += ' disabled';
                    
                    if (index === data.correct) {
                        className += ' correct';
                        feedbackHtml = '<span class="feedback-badge feedback-correct">CORRECT</span>';
                    } else if (index === savedAnswer) {
                        className += ' incorrect';
                        feedbackHtml = '<span class="feedback-badge feedback-incorrect">INCORRECT</span>';
                    }
                }

                optionsHtml += `
                    <button class="${className}" onclick="selectAnswer(${index})" ${savedAnswer !== null ? 'disabled' : ''}>
                        ${opt}
                        ${feedbackHtml}
                    </button>
                `;
            });

            const explanationHtml = savedAnswer !== null 
                ? `<div class="explanation-box" style="display:block;"><strong>📘 Explanation:</strong><br>${data.explanation}</div>` 
                : `<div class="explanation-box" id="explanation-${currentQuestionIndex}"></div>`;

            questionContainer.innerHTML = `
                <div class="section-title">${data.section}</div>
                <div class="question-text">${data.question}</div>
                <div class="options-grid">${optionsHtml}</div>
                ${explanationHtml}
            `;

            // Update Grid Highlight
            renderGrid();
        }

        // --- HANDLE ANSWER SELECTION ---
        function selectAnswer(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return; // Prevent changing answer

            userAnswers[currentQuestionIndex] = selectedIndex;
            
            // Calculate Score
            if (selectedIndex === quizData[currentQuestionIndex].correct) {
                score++;
            }

            renderQuestion(); // Re-render to show feedback
            updateNavButtons();
            renderGrid(); // Update grid to show "Answered" status
        }

        // --- NAVIGATION LOGIC ---
        function changeQuestion(direction) {
            const newIndex = currentQuestionIndex + direction;
            if (newIndex >= 0 && newIndex < quizData.length) {
                currentQuestionIndex = newIndex;
                renderQuestion();
                updateNavButtons();
            }
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            renderQuestion();
            updateNavButtons();
            toggleModal(); // Close modal
        }

        function updateNavButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            
            // If on last question, change Next to Finish
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerText = "Finish";
                nextBtn.onclick = showResults;
            } else {
                nextBtn.innerText = "Next";
                nextBtn.onclick = () => changeQuestion(1);
            }
        }

        // --- MODAL LOGIC ---
        function toggleModal() {
            const isVisible = overviewModal.style.display === 'flex';
            overviewModal.style.display = isVisible ? 'none' : 'flex';
            renderGrid(); // Refresh grid state when opening
        }

        function renderGrid() {
            questionGrid.innerHTML = '';
            quizData.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerText = index + 1;

                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                } else if (userAnswers[index] !== null) {
                    item.classList.add('answered');
                }

                item.onclick = () => jumpToQuestion(index);
                questionGrid.appendChild(item);
            });
        }

        // --- RESULTS LOGIC ---
        function showResults() {
            // Ensure last answer is counted if not yet submitted
            if (userAnswers[currentQuestionIndex] === null) {
               // Just in case user clicks finish without answering last Q
               // Ideally we force answer, but for free navigation, we just show results based on what's done
            }

            quizContent.classList.add('hidden');
            navBar.classList.add('hidden');
            resultScreen.style.display = 'flex';
            
            // Calculate final score accurately
            let finalScoreCalc = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans === quizData[idx].correct) finalScoreCalc++;
            });

            finalScore.innerText = `${finalScoreCalc} / ${quizData.length}`;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = new Array(quizData.length).fill(null);
            score = 0;
            
            quizContent.classList.remove('hidden');
            navBar.classList.remove('hidden');
            resultScreen.style.display = 'none';
            
            initQuiz();
        }

        // Start App
        initQuiz();

    </script>
</body>
</html>
